<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>공급사 검색</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 560px;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .search-box input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text-primary);
      background: var(--bg);
    }

    .search-box input:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .search-box button {
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover {
      background: #1d4ed8;
    }

    .results-wrap {
      display: none;
      margin-bottom: 16px;
    }

    .results-wrap.show { display: block; }

    .results-count {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .result {
      background: var(--accent-light);
      border: 1.5px solid #bfdbfe;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 10px;
    }

    .result:last-child { margin-bottom: 0; }

    .result-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .result-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .result-row:last-child { margin-bottom: 0; }

    .result-label {
      color: var(--text-secondary);
      min-width: 60px;
      font-weight: 500;
    }

    .result-value {
      color: var(--text-primary);
      font-weight: 400;
    }

    .error {
      display: none;
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 14px;
      color: #dc2626;
      margin-bottom: 16px;
    }

    .error.show { display: block; }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .loading.show { display: block; }

    .tip {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 공급사 검색</h1>
      <p>거래처명을 입력하면 전화번호와 주소를 바로 확인할 수 있어요</p>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="거래처명 입력 (예: 님프)" />
      <button onclick="searchSupplier()">검색</button>
    </div>

    <div class="loading" id="loading">검색 중...</div>
    <div class="error" id="error"></div>

    <div class="results-wrap" id="resultsWrap">
      <div class="results-count" id="resultsCount"></div>
      <div id="resultsList"></div>
    </div>

    <p class="tip">엔터키로도 검색할 수 있어요</p>
  </div>

  <script>
    // ⬇️ 여기에 구글 시트 ID 입력
    const SHEET_ID = '1bP7Nwovu3wFV7T1UOlUhS-O56nMeZ7-3lSZ0iNHUcrc';
    const SHEET_NAME = 'Sheet1'; // 시트 탭 이름 (기본값: Sheet1)

    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchSupplier();
    });

    async function searchSupplier() {
      const query = document.getElementById('searchInput').value.trim();
      const resultsWrap = document.getElementById('resultsWrap');
      const resultsList = document.getElementById('resultsList');
      const resultsCount = document.getElementById('resultsCount');
      const errorEl = document.getElementById('error');
      const loadingEl = document.getElementById('loading');

      resultsWrap.classList.remove('show');
      errorEl.classList.remove('show');
      loadingEl.classList.add('show');
      resultsList.innerHTML = '';

      if (!query) {
        loadingEl.classList.remove('show');
        errorEl.textContent = '거래처명을 입력해주세요!';
        errorEl.classList.add('show');
        return;
      }

      try {
        const res = await fetch(URL);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const rows = json.table.rows;

        const found = rows.filter(row => {
          const name = row.c[0]?.v || '';
          return name.toString().includes(query);
        });

        loadingEl.classList.remove('show');

        if (found.length > 0) {
          resultsCount.textContent = `"${query}" 검색 결과 ${found.length}건`;
          found.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result';
            div.innerHTML = `
              <div class="result-name">${item.c[0]?.v || '-'}</div>
              <div class="result-row">
                <span class="result-label">📞 전화번호</span>
                <span class="result-value">${item.c[1]?.v || '-'}</span>
              </div>
              <div class="result-row">
                <span class="result-label">📍 주소</span>
                <span class="result-value">${item.c[2]?.v || '-'}</span>
              </div>
            `;
            resultsList.appendChild(div);
          });
          resultsWrap.classList.add('show');
        } else {
          errorEl.textContent = `"${query}" 에 해당하는 거래처를 찾을 수 없어요.`;
          errorEl.classList.add('show');
        }
      } catch (e) {
        loadingEl.classList.remove('show');
        errorEl.textContent = '시트 연결에 실패했어요. 구글 시트 공개 설정을 확인해주세요.';
        errorEl.classList.add('show');
      }
    }
  </script>
</body>
</html>
