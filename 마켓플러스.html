<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더제이수 마켓 디스크립션 생성기</title>
<style>
:root {
  --bg: #f7f7f5;
  --card: #ffffff;
  --ink: #1a1a1a;
  --muted: #888;
  --line: #e8e8e6;
  --accent: #2d5f3f;
  --accent-hover: #1f4530;
  --warn: #c15a1f;
  --ok: #2d5f3f;
  --error: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
}
.header {
  background: var(--ink);
  color: #fff;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header .badge {
  background: rgba(255,255,255,0.15);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}
.input-section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}
.input-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.input-row {
  display: flex;
  gap: 12px;
  align-items: stretch;
}
.input-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.input-wrap label {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
}
.url-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  background: #fff;
}
.url-input:focus {
  outline: none;
  border-color: var(--accent);
}
.run-btn {
  padding: 0 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  align-self: flex-end;
  height: 44px;
}
.run-btn:hover { background: var(--accent-hover); }
.run-btn:disabled { background: #999; cursor: not-allowed; }

.status-bar {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 12px;
  display: none;
}
.status-bar.show { display: block; }
.status-bar.info { background: #e8f4f0; color: #1f4530; }
.status-bar.ok { background: #e8f4f0; color: #1f4530; }
.status-bar.warn { background: #fdf3e6; color: #c15a1f; }
.status-bar.error { background: #fde8e6; color: #c0392b; }

.product-info {
  background: #fafafa;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  margin-bottom: 16px;
  display: none;
}
.product-info.show { display: block; }
.product-info-row {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
}
.product-info-label {
  color: var(--muted);
  font-size: 11px;
}
.product-info-value {
  font-weight: 600;
}

.results { display: none; }
.results.show { display: block; }

.result-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
}
.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  background: #fafafa;
}
.result-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.result-title-num {
  background: var(--ink);
  color: #fff;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}
.result-title-text {
  font-size: 14px;
  font-weight: 600;
}
.result-title-sub {
  font-size: 11px;
  color: var(--muted);
  margin-left: 4px;
}
.copy-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.copy-btn:hover { background: var(--accent-hover); }
.copy-btn.copied { background: #555; }

.code-area {
  padding: 16px 20px;
  background: #1e1e1e;
  color: #e8e8e6;
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  font-size: 12px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
}

.preview-area {
  padding: 20px 24px;
  background: #fff;
}
.preview-area h3 {
  font-size: 15px;
  font-weight: 600;
  margin-top: 16px;
  margin-bottom: 8px;
  color: var(--ink);
}
.preview-area h3:first-child { margin-top: 0; }
.preview-area p {
  font-size: 13px;
  margin-bottom: 8px;
  line-height: 1.7;
}
.preview-area ul {
  padding-left: 20px;
  margin-bottom: 12px;
}
.preview-area li {
  font-size: 13px;
  margin-bottom: 4px;
}
.preview-area table {
  border-collapse: collapse;
  margin-top: 8px;
  font-size: 12px;
}
.preview-area th, .preview-area td {
  border: 1px solid #ddd;
  padding: 8px 14px;
  text-align: center;
}
.preview-area th {
  background: #f5f5f3;
  font-weight: 600;
}

.guide-card {
  background: #fdf3e6;
  border: 1px solid #f0c896;
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #7a3e0a;
  line-height: 1.7;
}
.guide-card strong { color: #c15a1f; }
.guide-card ol {
  padding-left: 20px;
  margin-top: 8px;
}
.guide-card li { margin-bottom: 4px; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--ink);
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
  z-index: 1000;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>📝 더제이수 마켓 디스크립션 생성기</h1>
  <span class="badge">자사몰 → 마켓 글+사이즈 자동 정리</span>
</div>

<div class="container">

  <div class="guide-card">
    <strong>📌 사용 방법</strong>
    <ol>
      <li>자사몰 상품 URL을 입력하고 <strong>✨ 생성하기</strong> 클릭</li>
      <li>아래 결과 카드에서 <strong>📋 복사하기</strong> 버튼으로 HTML 복사</li>
      <li>카페24 어드민 → 해당 상품 수정 → 상세설명 칸에 <strong>붙여넣기</strong> (기존 내용 끝에 추가)</li>
      <li>저장 → 마켓 보내기에서 자동으로 글+사이즈가 함께 전송됨</li>
    </ol>
  </div>

  <div class="input-section">
    <div class="input-title">상품 URL 입력</div>
    <div class="input-row">
      <div class="input-wrap">
        <label>자사몰 상품 URL</label>
        <input class="url-input" id="productUrl" type="text" placeholder="https://thejsoo.com/product/detail.html?product_no=22021...">
      </div>
      <button class="run-btn" id="runBtn" onclick="runGenerate()">✨ 생성하기</button>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <div class="product-info" id="productInfo">
    <div class="product-info-row">
      <span class="product-info-label">상품명</span>
      <span class="product-info-value" id="infoName">-</span>
      <span class="product-info-label" style="margin-left:16px;">상품코드</span>
      <span class="product-info-value" id="infoCode">-</span>
      <span class="product-info-label" style="margin-left:16px;">판매가</span>
      <span class="product-info-value" id="infoPrice">-</span>
    </div>
  </div>

  <div class="results" id="results">

    <!-- 1. HTML 코드 -->
    <div class="result-card">
      <div class="result-header">
        <div class="result-title">
          <span class="result-title-num">1</span>
          <span class="result-title-text">HTML 코드</span>
          <span class="result-title-sub">카페24 상세설명에 붙여넣기</span>
        </div>
        <button class="copy-btn" id="copyHtmlBtn" onclick="copyCode()">📋 복사하기</button>
      </div>
      <div class="code-area" id="codeArea"></div>
    </div>

    <!-- 2. 미리보기 -->
    <div class="result-card">
      <div class="result-header">
        <div class="result-title">
          <span class="result-title-num">2</span>
          <span class="result-title-text">미리보기</span>
          <span class="result-title-sub">실제 마켓에서 보일 모습</span>
        </div>
      </div>
      <div class="preview-area" id="previewArea"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================
// GAS URL (코디 생성기와 동일한 GAS 사용)
// ============================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwNO6u8WyT476tIIJ0OXQ2uEpTRCTGJirg93NQVCEpspJq_UzuxcJH-6ZRPgn2bmOYejA/exec';

let _generatedHtml = '';

function showStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar show ' + type;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function runGenerate() {
  const url = document.getElementById('productUrl').value.trim();
  if (!url) {
    toast('⚠️ 상품 URL을 입력해주세요!');
    return;
  }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';
  showStatus('📡 카페24에서 상품 정보를 가져오는 중이에요...', 'info');
  document.getElementById('results').classList.remove('show');
  document.getElementById('productInfo').classList.remove('show');

  try {
    const apiUrl = `${GAS_URL}?action=generate_market_desc&url=${encodeURIComponent(url)}`;
    const res = await fetch(apiUrl);
    if (!res.ok) throw new Error(`서버 오류 ${res.status}`);
    const json = await res.json();
    if (json.result !== 'ok') throw new Error(json.message || '알 수 없는 오류');

    // 상품 정보 표시
    document.getElementById('infoName').textContent = json.productName || '-';
    document.getElementById('infoCode').textContent = json.productCode || '-';
    document.getElementById('infoPrice').textContent = json.price ? '₩' + Number(json.price).toLocaleString() : '-';
    document.getElementById('productInfo').classList.add('show');

    // HTML 코드 표시
    _generatedHtml = json.marketHtml || '';
    document.getElementById('codeArea').textContent = _generatedHtml;

    // 미리보기 표시 (market-only div의 내용을 그대로 렌더링)
    document.getElementById('previewArea').innerHTML = _generatedHtml.replace(/<!--[\s\S]*?-->/g, '');

    document.getElementById('results').classList.add('show');
    showStatus(`✅ "${json.productName}" 디스크립션이 생성됐어요!`, 'ok');
    toast('✅ 생성 완료!');

  } catch(e) {
    showStatus('❌ 오류: ' + e.message, 'error');
    toast('❌ 오류 발생');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 생성하기';
  }
}

function copyCode() {
  if (!_generatedHtml) return;
  navigator.clipboard.writeText(_generatedHtml).then(() => {
    const btn = document.getElementById('copyHtmlBtn');
    btn.textContent = '✅ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 복사하기';
      btn.classList.remove('copied');
    }, 2000);
    toast('📋 클립보드에 복사됐어요!');
  });
}

// 엔터키로 실행
document.getElementById('productUrl').addEventListener('keypress', e => {
  if (e.key === 'Enter') runGenerate();
});
</script>
</body>
</html>
