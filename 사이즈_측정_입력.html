<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>사이즈 측정 입력</title>
<style>
:root {
  --bg: #f2f2f0;
  --white: #ffffff;
  --border: #e4e4e2;
  --border-focus: #1e1e1e;
  --text: #1a1a1a;
  --text-sub: #666;
  --text-muted: #aaa;
  --accent: #1e1e1e;
  --accent-light: #f0f0ee;
  --red: #e84040;
  --green: #16a34a;
  --radius-card: 16px;
  --radius-input: 12px;
  --tab-h: 40px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 120px; }

/* ─── 설정 배너 ─── */
.setup-banner { background: #fffbeb; border-bottom: 2px solid #f59e0b; padding: 11px 18px; font-size: 13px; color: #92400e; display: flex; align-items: center; gap: 8px; }
.setup-banner.hidden { display: none; }
.setup-banner strong { font-weight: 700; }
.setup-banner a { color: #92400e; font-weight: 700; text-decoration: underline; cursor: pointer; }

/* ─── 헤더 ─── */
.header { background: var(--accent); color: #fff; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo { width: 30px; height: 30px; background: #fff; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-title { font-size: 15px; font-weight: 700; }
.header-date { font-size: 11px; color: #999; margin-top: 1px; }
.btn-setting { background: rgba(255,255,255,0.12); border: none; border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; flex-shrink: 0; }
.header-title-row { display: flex; align-items: center; gap: 8px; }
.btn-sheet-link { display: inline-flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 3px 9px; color: rgba(255,255,255,0.9); font-size: 11px; font-weight: 600; text-decoration: none; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
.btn-sheet-link:active { background: rgba(255,255,255,0.28); }

/* ─── 페이지 컨테이너 ─── */
.page { padding: 14px 14px 0; max-width: 480px; margin: 0 auto; }

/* ─── 섹션 카드 ─── */
.card { background: var(--white); border-radius: var(--radius-card); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
.card-title { font-size: 11.5px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; text-transform: uppercase; padding: 12px 16px 0; }

/* ─── 기본 정보 ─── */
.info-fields { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 10px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; }
.field-label .req { color: var(--red); }
input[type="text"] {
  width: 100%; height: 48px; padding: 0 14px; font-size: 15px; font-family: inherit;
  border: 1.5px solid var(--border); border-radius: var(--radius-input); outline: none;
  background: #fafaf8; color: var(--text); transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none; appearance: none;
}
input[type="text"]:focus { border-color: var(--border-focus); background: #fff; }

/* ─── 의류 타입 탭 ─── */
.field-hint { font-size: 11.5px; color: #c0c0be; margin-top: 5px; line-height: 1.55; }

/* ─── 제작/사입 토글 ─── */
.order-type-wrap { display: flex; gap: 8px; }
.order-type-btn {
  flex: 1; height: 46px; border: 1.5px solid var(--border); border-radius: 12px;
  background: #fafaf8; color: #999; font-size: 14px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.order-type-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ─── 의류 타입 탭 ─── */
.type-tabs-wrap { padding: 10px 16px 14px; }
.type-tabs { display: flex; gap: 7px; flex-wrap: wrap; }
.type-tab { height: var(--tab-h); padding: 0 14px; font-size: 13px; font-weight: 600; font-family: inherit; border: 1.5px solid var(--border); border-radius: 20px; background: var(--white); color: #777; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.type-tab.active { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ─── 사이즈 섹션 제목 ─── */
.sizes-section-title { font-size: 11.5px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; text-transform: uppercase; padding: 0 2px 8px; }

/* ─── 사이즈 블록들 ─── */
.sizes-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }

/* ─── 단일 사이즈 블록 ─── */
.size-block { border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--white); transition: border-color 0.2s; }
.size-block.active-block { border-color: #555; }

.size-block-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f7f7f5; border-bottom: 1px solid var(--border); }
.size-block-left { display: flex; align-items: center; gap: 8px; }
.size-block-num { width: 22px; height: 22px; border-radius: 6px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.size-name-badge { font-size: 11px; font-weight: 600; color: #888; }

/* ─── 사이즈명 콤보박스 ─── */
.size-name-combo { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.size-preset-btns { display: flex; gap: 5px; flex-wrap: nowrap; }
.size-preset-btn {
  height: 34px; padding: 0 13px; font-size: 13px; font-weight: 700; font-family: inherit;
  border: 1.5px solid var(--border); border-radius: 8px; background: #fff;
  color: #555; cursor: pointer; transition: all 0.13s; white-space: nowrap; flex-shrink: 0;
}
.size-preset-btn:active { background: var(--accent-light); }
.size-preset-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
.size-preset-btn.custom-btn { border-style: dashed; color: #888; border-color: #c8c8c6; }
.size-preset-btn.custom-btn.selected { border-style: solid; background: var(--accent); color: #fff; border-color: var(--accent); }
.size-name-input {
  height: 34px; width: 90px; padding: 0 10px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  border: 1.5px solid var(--border-focus); border-radius: 8px; outline: none; background: #fff;
  -webkit-appearance: none; appearance: none; color: var(--text);
}
.size-name-input::placeholder { font-weight: 400; color: var(--text-muted); font-size: 13px; }
.size-name-input:focus { border-color: var(--border-focus); }
.size-name-input.hidden { display: none; }

.btn-remove-size { width: 32px; height: 32px; border: none; background: none; border-radius: 8px; cursor: pointer; color: #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.btn-remove-size:active { background: #fff0f0; color: var(--red); }

/* ─── 측정값 그리드 ─── */
.size-vals { padding: 10px 14px 12px; display: grid; gap: 8px; }
.val-row { display: grid; grid-template-columns: 74px 1fr; gap: 8px; align-items: center; }
.val-label { font-size: 13px; font-weight: 600; color: #444; text-align: right; padding-right: 2px; white-space: nowrap; }
.val-input-wrap { position: relative; }
.val-inp {
  width: 100%; height: 44px; padding: 0 32px 0 12px; font-size: 16px; font-family: inherit;
  border: 1.5px solid var(--border); border-radius: 10px; outline: none;
  background: #fafaf8; color: var(--text); transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none; appearance: none;
}
.val-inp:focus { border-color: var(--border-focus); background: #fff; }
.val-inp.has-value { color: var(--text); font-weight: 600; }
.val-unit { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-muted); pointer-events: none; font-weight: 500; }

/* ─── 사이즈 추가 버튼 ─── */
.btn-add-size { width: 100%; height: 52px; border: 2px dashed #d0d0ce; border-radius: 14px; background: transparent; color: #888; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.12s; }
.btn-add-size:active { background: var(--accent-light); border-color: #aaa; color: var(--text); }

/* ─── 추가 섹션 ─── */
.extra-section-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
.extra-section-block { border: 1.5px solid #d4e3ff; border-radius: 14px; overflow: hidden; background: var(--white); }
.extra-section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f0f5ff; border-bottom: 1px solid #d4e3ff; }
.extra-section-title { font-size: 13px; font-weight: 700; color: #3a6fd8; display: flex; align-items: center; gap: 6px; }
.extra-section-badge { font-size: 10px; font-weight: 600; background: #dceaff; color: #3a6fd8; border-radius: 10px; padding: 2px 8px; }
.btn-remove-extra { width: 28px; height: 28px; border: none; background: none; border-radius: 7px; cursor: pointer; color: #aac4f0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-remove-extra:active { background: #fff0f0; color: var(--red); }
.extra-name-input { height: 30px; padding: 0 8px; font-size: 13px; font-weight: 600; font-family: inherit; border: 1.5px solid #c0d4f8; border-radius: 7px; outline: none; background: #fff; color: #3a6fd8; width: 100px; -webkit-appearance: none; }
.extra-name-input:focus { border-color: #3a6fd8; }

/* 추가 섹션 버튼 그룹 */
.add-extra-section-area { margin-bottom: 10px; }
.add-extra-label { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 7px; padding: 0 2px; }
.add-extra-btns { display: flex; gap: 7px; flex-wrap: wrap; }
.btn-add-extra { height: 36px; padding: 0 13px; font-size: 12.5px; font-weight: 600; font-family: inherit; border: 1.5px dashed #c8c8c6; border-radius: 10px; background: #fff; color: #888; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-add-extra:active { border-color: #3a6fd8; color: #3a6fd8; background: #f0f5ff; border-style: solid; }
.btn-add-extra:disabled { opacity: 0.3; pointer-events: none; }

/* ─── 메모 ─── */
.memo-wrap { padding: 10px 16px 14px; }
textarea {
  width: 100%; height: 68px; padding: 11px 14px; font-size: 14px; font-family: inherit;
  border: 1.5px solid var(--border); border-radius: var(--radius-input); outline: none;
  background: #fafaf8; color: var(--text); resize: none; transition: border-color 0.15s;
  -webkit-appearance: none;
}
textarea:focus { border-color: var(--border-focus); background: #fff; }

/* ─── 저장 푸터 ─── */
.save-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding: 11px 14px max(12px, env(safe-area-inset-bottom)); z-index: 60; }
.save-footer-inner { max-width: 480px; margin: 0 auto; }
.btn-save { width: 100%; height: 54px; border: none; border-radius: 14px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; transition: background 0.15s; }
.btn-save:active { background: #333; }
.btn-save:disabled { background: #b8b8b8; cursor: default; }
.save-count-badge { background: rgba(255,255,255,0.22); border-radius: 20px; padding: 2px 9px; font-size: 13px; font-weight: 600; }

/* ─── 토스트 ─── */
.toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(8px); background: #222; color: #fff; padding: 12px 20px; border-radius: 24px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; z-index: 999; white-space: nowrap; transition: all 0.22s; max-width: 92vw; text-align: center; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: var(--red); }
.toast.ok { background: var(--green); }

/* ─── 설정 바텀시트 ─── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: #fff; border-radius: 22px 22px 0 0; width: 100%; max-width: 480px; padding: 8px 18px max(24px, env(safe-area-inset-bottom)); }
.sheet-handle { width: 36px; height: 4px; background: #e0e0de; border-radius: 2px; margin: 0 auto 18px; }
.sheet h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.sheet p { font-size: 12.5px; color: #888; margin-bottom: 14px; line-height: 1.65; }
.sheet-url-input { width: 100%; height: 48px; padding: 0 14px; font-size: 13px; font-family: inherit; border: 1.5px solid var(--border); border-radius: var(--radius-input); outline: none; margin-bottom: 14px; -webkit-appearance: none; }
.sheet-url-input:focus { border-color: var(--border-focus); }
.sheet-btns { display: flex; gap: 10px; }
.btn-sheet-cancel { flex: 1; height: 50px; border: none; border-radius: 12px; background: var(--accent-light); color: #555; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn-sheet-ok { flex: 2; height: 50px; border: none; border-radius: 12px; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }

/* ─── 스피너 ─── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>
</head>
<body>

<!-- 설정 배너 -->
<div class="setup-banner" id="setup-banner">
  <span>⚠️</span>
  <span><strong>구글 시트 미연결.</strong> <a onclick="openSettings()">지금 설정하기 →</a></span>
</div>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#1e1e1e"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#1e1e1e"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#1e1e1e"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#ccc"/>
      </svg>
    </div>
    <div>
      <div class="header-title-row">
        <span class="header-title">사이즈 측정 입력</span>
        <a class="btn-sheet-link" href="https://docs.google.com/spreadsheets/d/1dN88i8_YCbhg9gY-bX95wzYCfFAFYZBSTmTCnK9XQHA" target="_blank">
          <svg width="11" height="11" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="2" width="14" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          구글 시트 열기
        </a>
      </div>
      <div class="header-date" id="header-date"></div>
    </div>
  </div>
  <button class="btn-setting" onclick="openSettings()">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.7"/>
      <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<div class="page">

  <!-- 기본 정보 카드 -->
  <div class="card">
    <div class="card-title">기본 정보</div>
    <div class="info-fields">
      <div>
        <div class="field-label">구분 <span class="req">*</span></div>
        <div class="order-type-wrap">
          <button class="order-type-btn" id="btn-saip" onclick="selectOrderType('사입')">사입</button>
          <button class="order-type-btn" id="btn-jejak" onclick="selectOrderType('제작')">제작</button>
        </div>
      </div>
      <div>
        <div class="field-label">상품명 <span class="req">*</span></div>
        <input type="text" id="product" placeholder="상품명 입력" autocomplete="off">
        <div class="field-hint" id="product-hint">제작 상품의 경우, 소재·디자인 포인트 등 주요 특징을 함께 적어주세요.</div>
      </div>
    </div>
  </div>

  <!-- 의류 타입 카드 -->
  <div class="card">
    <div class="card-title" style="padding-bottom:2px;">의류 타입</div>
    <div class="type-tabs-wrap">
      <div class="type-tabs" id="type-tabs"></div>
    </div>
  </div>

  <!-- 사이즈 측정값 (카드 밖에 개별 블록으로) -->
  <div class="sizes-section-title">사이즈 측정값</div>
  <div class="sizes-wrap" id="sizes-wrap"></div>
  <button class="btn-add-size" id="btn-add-size" onclick="addSizeBlock()">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
      <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    사이즈 추가
  </button>

  <!-- 추가 섹션 -->
  <div class="add-extra-section-area" id="add-extra-area"></div>
  <div class="extra-section-wrap" id="extra-sections-wrap"></div>

  <!-- 메모 카드 -->
  <div class="card">
    <div class="card-title">메모 (선택)</div>
    <div class="memo-wrap">
      <textarea id="memo" placeholder="특이사항 메모..."></textarea>
    </div>
  </div>

</div>

<!-- 하단 고정 저장 버튼 -->
<div class="save-footer">
  <div class="save-footer-inner">
    <button class="btn-save" id="btn-save" onclick="saveAll()">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M3 10l5 5L17 4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      저장
      <span class="save-count-badge" id="save-count">1개</span>
    </button>
  </div>
</div>

<!-- 설정 바텀시트 -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSettings()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>⚙️ 구글 시트 연결</h3>
    <p>Google Apps Script 웹앱 URL을 붙여넣어 주세요.<br>설정 방법은 가이드를 참고하세요.</p>
    <input class="sheet-url-input" type="text" id="url-input" placeholder="https://script.google.com/macros/s/...">
    <div class="sheet-btns">
      <button class="btn-sheet-cancel" onclick="closeSettings()">취소</button>
      <button class="btn-sheet-ok" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  상수 & 상태
// ═══════════════════════════════════════════
let SCRIPT_URL = localStorage.getItem('thejsoo_script_url') || 'https://script.google.com/macros/s/AKfycbxJorWS_vIVR7lYxV8zYaVbpIZT8EYjAftPOcz4T2Hh6fKhxg0P8SAgoHpv30RaVMBBRg/exec';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1dN88i8_YCbhg9gY-bX95wzYCfFAFYZBSTmTCnK9XQHA';

const TYPES = {
  '상의':             ['어깨','가슴','암홀','팔길이','소매','밑단','총길이','허리'],
  '바지':             ['허리','힙','밑위','허벅지','밑단','총길이'],
  '스커트':           ['허리','힙','밑단','총길이'],
  '원피스':           ['어깨','가슴','암홀','팔길이','소매','허리','힙','밑단','총길이'],
  '아우터':           ['어깨','가슴','암홀','팔길이','소매','밑단','총길이','허리'],
  '상의(슬리브리스)': ['어깨','가슴','암홀','밑단','총길이','허리'],
  '셋업(바지)':       ['어깨','가슴','암홀','팔길이','소매','밑단','총길이','허리','하의허리','힙','밑위','허벅지','하의밑단','하의총길이'],
  '셋업(스커트)':     ['어깨','가슴','암홀','팔길이','소매','밑단','총길이','허리','하의허리','힙','하의밑단','하의총길이'],
  '신발':             ['굽','총높이'],
  '벨트':             ['벨트폭','벨트총길이'],
  '스카프/머플러':    ['스카프가로','스카프세로'],
};

let currentType = '상의';
let orderType = '';    // '사입' | '제작'
let sizeBlocks = [];   // [{ id, name, vals:{col:val} }]
let blockIdCounter = 0;

// 추가 섹션
const EXTRA_OPTIONS = [
  { key: '벨트',    cols: ['벨트폭','벨트총길이'] },
  { key: '스카프',  cols: ['스카프가로','스카프세로'] },
  { key: '머플러',  cols: ['스카프가로','스카프세로'] },
  { key: '직접입력', cols: ['항목1','항목2'] },
];
const CLOTH_TYPES = ['상의','바지','스커트','원피스','아우터','상의(슬리브리스)','셋업(바지)','셋업(스커트)'];
let extraSections = []; // [{ id, key, name, cols, vals:{sizeName, col:val} }]
let extraIdCounter = 0;

// ═══════════════════════════════════════════
//  초기화
// ═══════════════════════════════════════════
function init() {
  // KST 날짜
  const kst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  document.getElementById('header-date').textContent =
    `📅 ${kst.getFullYear()}년 ${kst.getMonth()+1}월 ${kst.getDate()}일`;

  // 타입 탭 렌더
  const wrap = document.getElementById('type-tabs');
  Object.keys(TYPES).forEach(t => {
    const b = document.createElement('button');
    b.className = 'type-tab' + (t === currentType ? ' active' : '');
    b.textContent = t;
    b.onclick = () => switchType(t);
    wrap.appendChild(b);
  });

  addSizeBlock(); // 첫 블록
  renderExtraAddButtons(); // 초기 추가 섹션 버튼
  checkBanner();
}

// ═══════════════════════════════════════════
//  타입 전환
// ═══════════════════════════════════════════
function switchType(t) {
  currentType = t;
  document.querySelectorAll('.type-tab').forEach(b =>
    b.classList.toggle('active', b.textContent === t));
  sizeBlocks.forEach(b => { b.vals = {}; });
  extraSections = [];
  extraIdCounter = 0;
  renderAllBlocks();
  renderExtraAddButtons();
  document.getElementById('extra-sections-wrap').innerHTML = '';
}

// ═══════════════════════════════════════════
//  사이즈 블록 CRUD
// ═══════════════════════════════════════════
function addSizeBlock() {
  const id = ++blockIdCounter;
  sizeBlocks.push({ id, name: '', vals: {} });
  renderAllBlocks();
  setTimeout(() => {
    const inp = document.getElementById(`sname-${id}`);
    if (inp) { inp.focus(); inp.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }, 60);
}

function removeSizeBlock(id) {
  if (sizeBlocks.length <= 1) { showToast('최소 1개는 필요합니다', 'err'); return; }
  sizeBlocks = sizeBlocks.filter(b => b.id !== id);
  renderAllBlocks();
}

// ═══════════════════════════════════════════
//  추가 섹션
// ═══════════════════════════════════════════
function renderExtraAddButtons() {
  const area = document.getElementById('add-extra-area');
  if (!CLOTH_TYPES.includes(currentType)) { area.innerHTML = ''; return; }
  const usedKeys = extraSections.map(s => s.key).filter(k => k !== '직접입력');
  let html = `<div class="add-extra-label">추가 항목</div><div class="add-extra-btns">`;
  EXTRA_OPTIONS.forEach(opt => {
    const disabled = opt.key !== '직접입력' && usedKeys.includes(opt.key) ? ' disabled' : '';
    html += `<button class="btn-add-extra"${disabled} onclick="addExtraSection('${opt.key}')">+ ${opt.key}</button>`;
  });
  html += `</div>`;
  area.innerHTML = html;
}

function addExtraSection(key) {
  const id = ++extraIdCounter;
  const opt = EXTRA_OPTIONS.find(o => o.key === key);
  const cols = opt ? [...opt.cols] : ['항목1','항목2'];
  const defaultSizeName = ['벨트','스카프','머플러'].includes(key) ? 'FREE' : '';
  extraSections.push({ id, key, name: key, cols, sizeName: defaultSizeName, vals: {} });
  renderExtraSections();
  renderExtraAddButtons();
  setTimeout(() => {
    const el = document.getElementById(`extra-block-${id}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 60);
}

function removeExtraSection(id) {
  extraSections = extraSections.filter(s => s.id !== id);
  renderExtraSections();
  renderExtraAddButtons();
}

function renderExtraSections() {
  const wrap = document.getElementById('extra-sections-wrap');
  wrap.innerHTML = '';
  extraSections.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'extra-section-block';
    div.id = `extra-block-${sec.id}`;

    const isCustom = sec.key === '직접입력';
    const titleHtml = isCustom
      ? `<input class="extra-name-input" type="text" value="${sec.name === '직접입력' ? '' : sec.name}" placeholder="섹션명" oninput="onExtraName(${sec.id},this.value)">`
      : `<span>${sec.name}</span>`;
    const badgeText = sec.cols.join(' · ');

    const valsHtml = sec.cols.map((col, ci) => {
      const v = sec.vals[col] || '';
      return `
        <div class="val-row">
          <div class="val-label">${col}</div>
          <div class="val-input-wrap">
            <input class="val-inp${v ? ' has-value' : ''}" type="text" inputmode="decimal"
              placeholder="" data-extra="${sec.id}" data-col="${col}" value="${v}"
              oninput="onExtraVal(${sec.id},'${col}',this.value)">
            <span class="val-unit">cm</span>
          </div>
        </div>`;
    }).join('');

    const sizeNameVal = sec.sizeName || '';
    // 프리셋: 벨트/스카프/머플러는 FREE 디폴트, 그 외는 S/M/L/FREE
    const extraPresets = ['FREE','S','M','L','직접입력'];
    const extraPresetBtns = extraPresets.map(p => {
      const isSel = p === '직접입력'
        ? (sizeNameVal && !['FREE','S','M','L'].includes(sizeNameVal))
        : sizeNameVal === p;
      const cls = isSel ? ' selected' : '';
      const isDash = p === '직접입력';
      return `<button class="size-preset-btn${cls}${isDash ? ' custom-btn' : ''}" style="height:30px;padding:0 10px;font-size:12px;"
        onclick="selectExtraPreset(${sec.id},'${p}')">${p}</button>`;
    }).join('');

    div.innerHTML = `
      <div class="extra-section-header">
        <div class="extra-section-title">
          ${titleHtml}
          <span class="extra-section-badge">${badgeText}</span>
        </div>
        <button class="btn-remove-extra" onclick="removeExtraSection(${sec.id})">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="size-vals">
        <div class="val-row">
          <div class="val-label" style="color:#3a6fd8;font-size:12px;">사이즈명</div>
          <div class="val-input-wrap" style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;">
            ${extraPresetBtns}
            <input class="val-inp extra-custom-inp" type="text" placeholder="직접입력..."
              style="font-weight:700;width:90px;height:30px;font-size:13px;display:${(sizeNameVal && !['FREE','S','M','L'].includes(sizeNameVal)) ? 'block' : 'none'};"
              data-extra="${sec.id}" data-col="__sizeName"
              value="${(sizeNameVal && !['FREE','S','M','L'].includes(sizeNameVal)) ? sizeNameVal : ''}"
              oninput="onExtraVal(${sec.id},'__sizeName',this.value)">
          </div>
        </div>
        ${valsHtml}
      </div>`;
    wrap.appendChild(div);
  });
}

function onExtraName(id, val) {
  const s = extraSections.find(s => s.id === id);
  if (s) s.name = val || '직접입력';
}

function selectExtraPreset(id, preset) {
  const s = extraSections.find(s => s.id === id);
  if (!s) return;
  const block = document.getElementById(`extra-block-${id}`);
  if (!block) return;
  const customInp = block.querySelector('.extra-custom-inp');

  if (preset === '직접입력') {
    // 직접입력 버튼 활성화, input 보이기
    block.querySelectorAll('.size-preset-btn').forEach(b => b.classList.remove('selected'));
    block.querySelectorAll('.size-preset-btn').forEach(b => {
      if (b.textContent === '직접입력') b.classList.add('selected');
    });
    if (customInp) { customInp.style.display = 'block'; customInp.focus(); }
    s.sizeName = customInp ? customInp.value : '';
  } else {
    s.sizeName = preset;
    block.querySelectorAll('.size-preset-btn').forEach(b =>
      b.classList.toggle('selected', b.textContent === preset));
    if (customInp) { customInp.style.display = 'none'; customInp.value = ''; }
  }
}
function onExtraVal(id, col, val) {
  const s = extraSections.find(s => s.id === id);
  if (!s) return;
  if (col === '__sizeName') s.sizeName = val;
  else s.vals[col] = val;
}

function syncExtraFromDOM() {
  extraSections.forEach(s => {
    // 프리셋 선택값 우선, 직접입력이면 input값
    const block = document.getElementById(`extra-block-${s.id}`);
    if (block) {
      const selectedBtn = [...block.querySelectorAll('.size-preset-btn.selected')].find(b => b.textContent !== '직접입력');
      if (selectedBtn) {
        s.sizeName = selectedBtn.textContent;
      } else {
        const customInp = block.querySelector('.extra-custom-inp');
        if (customInp) s.sizeName = customInp.value.trim();
      }
    }
    s.cols.forEach(col => {
      const inp = document.querySelector(`input[data-extra="${s.id}"][data-col="${col}"]`);
      if (inp) s.vals[col] = inp.value.trim();
    });
  });
}

function syncFromDOM() {
  sizeBlocks.forEach(b => {
    // 직접입력 활성화 상태면 input값으로 name 업데이트
    const inp = document.getElementById(`sname-${b.id}`);
    if (inp && !inp.classList.contains('hidden')) {
      b.name = inp.value.trim().toUpperCase();
    }
    TYPES[currentType].forEach(col => {
      const v = document.querySelector(`input[data-block="${b.id}"][data-col="${col}"]`);
      if (v) b.vals[col] = v.value.trim();
    });
  });
}

// ═══════════════════════════════════════════
//  사이즈 프리셋
// ═══════════════════════════════════════════
const SIZE_PRESETS = ['FREE', 'S', 'M', 'L', 'XL'];

// ═══════════════════════════════════════════
//  렌더링
// ═══════════════════════════════════════════
function renderAllBlocks() {
  const cols = TYPES[currentType];
  const wrap = document.getElementById('sizes-wrap');
  wrap.innerHTML = '';

  sizeBlocks.forEach((block, idx) => {
    const div = document.createElement('div');
    div.className = 'size-block';
    div.id = `block-${block.id}`;

    // 사이즈 프리셋 버튼
    const presetBtns = SIZE_PRESETS.map(p => {
      const sel = block.name === p ? ' selected' : '';
      return `<button class="size-preset-btn${sel}" onclick="selectPreset(${block.id},'${p}')">${p}</button>`;
    }).join('');

    // 직접입력 버튼
    const isCustom = block.name && !SIZE_PRESETS.includes(block.name);
    const customSel = isCustom ? ' selected' : '';
    const inputHidden = isCustom ? '' : ' hidden';

    const valsHtml = cols.map(col => {
      const v = block.vals[col] !== undefined ? block.vals[col] : '';
      // 빈 값이면 소수점 기본 표시 (placeholder), 저장된 값 있으면 그대로
      return `
        <div class="val-row">
          <div class="val-label">${col}</div>
          <div class="val-input-wrap">
            <input class="val-inp${v ? ' has-value' : ''}" type="text" inputmode="decimal"
              placeholder="" data-block="${block.id}" data-col="${col}" value="${v}"
              onfocus="onValFocus(this,${block.id})" onblur="onValBlur(this,${block.id},'${col}')"
              oninput="onValInput(this,${block.id},'${col}')">
            <span class="val-unit">cm</span>
          </div>
        </div>`;
    }).join('');

    const canDelete = sizeBlocks.length > 1;
    div.innerHTML = `
      <div class="size-block-header">
        <div class="size-block-left">
          <div class="size-block-num">${idx + 1}</div>
          <div class="size-name-combo">
            <div class="size-preset-btns">
              ${presetBtns}
              <button class="size-preset-btn custom-btn${customSel}" onclick="selectCustom(${block.id})">직접입력</button>
            </div>
            <input class="size-name-input${inputHidden}" type="text" id="sname-${block.id}"
              placeholder="예) XS, 2XL..."
              value="${isCustom ? block.name : ''}"
              onfocus="markActive(${block.id})"
              oninput="onNameInput(${block.id},this.value)">
          </div>
        </div>
        <button class="btn-remove-size" onclick="removeSizeBlock(${block.id})"
          style="${canDelete ? '' : 'opacity:0.2;pointer-events:none'}">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="size-vals">${valsHtml}</div>`;

    wrap.appendChild(div);
  });

  updateSaveCount();
}

function markActive(id) {
  document.querySelectorAll('.size-block').forEach(el => el.classList.remove('active-block'));
  const el = document.getElementById(`block-${id}`);
  if (el) el.classList.add('active-block');
}

function selectPreset(id, name) {
  const b = sizeBlocks.find(b => b.id === id);
  if (b) b.name = name;
  markActive(id);
  // DOM 직접 업데이트 (리렌더 없이)
  const block = document.getElementById(`block-${id}`);
  if (!block) return;
  block.querySelectorAll('.size-preset-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent === name);
  });
  // 직접입력 숨기기
  const inp = document.getElementById(`sname-${id}`);
  if (inp) inp.classList.add('hidden');
}

function selectCustom(id) {
  const b = sizeBlocks.find(b => b.id === id);
  markActive(id);
  const block = document.getElementById(`block-${id}`);
  if (!block) return;
  // 프리셋 버튼 선택 해제
  block.querySelectorAll('.size-preset-btn:not(.custom-btn)').forEach(btn => btn.classList.remove('selected'));
  block.querySelector('.custom-btn').classList.add('selected');
  // 직접입력 표시 & 포커스
  const inp = document.getElementById(`sname-${id}`);
  if (inp) {
    inp.classList.remove('hidden');
    inp.focus();
    if (b) b.name = inp.value.trim().toUpperCase();
  }
}

function onNameInput(id, val) {
  const b = sizeBlocks.find(b => b.id === id);
  if (b) b.name = val.trim().toUpperCase();
}

// ─── 측정값 입력 핸들러 ───
function onValFocus(el, id) {
  markActive(id);
}

function onValBlur(el, id, col) {
  const b = sizeBlocks.find(b => b.id === id);
  const raw = el.value.trim();
  if (!raw) {
    el.value = '';
    if (b) b.vals[col] = '';
    el.classList.remove('has-value');
    return;
  }
  // 숫자 정리: 정수면 소수점 붙이기 (5 → 5.)
  const n = parseFloat(raw);
  if (!isNaN(n)) {
    const formatted = String(n);
    el.value = formatted;
    if (b) b.vals[col] = formatted;
  } else {
    if (b) b.vals[col] = raw;
  }
  el.classList.toggle('has-value', !!el.value);
}

function onValInput(el, id, col) {
  // 숫자와 소수점만 허용
  el.value = el.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');
  const b = sizeBlocks.find(b => b.id === id);
  if (b) b.vals[col] = el.value;
  el.classList.toggle('has-value', !!el.value);
}

function updateSaveCount() {
  const el = document.getElementById('save-count');
  if (el) el.textContent = `${sizeBlocks.length}개`;
}

// ═══════════════════════════════════════════
//  저장
// ═══════════════════════════════════════════
async function saveAll() {
  if (!SCRIPT_URL) { openSettings(); return; }

  // DOM 최신값 동기화
  syncFromDOM();

  const product = document.getElementById('product').value.trim();
  const memo    = document.getElementById('memo').value.trim();

  if (!orderType) { showToast('제작 / 사입을 선택해주세요', 'err'); return; }
  if (!product)   { showToast('상품명을 입력해주세요', 'err'); document.getElementById('product').focus(); return; }

  // 사이즈명 빈 항목 체크
  const unnamed = sizeBlocks.find(b => !b.name);
  if (unnamed) {
    showToast('사이즈명을 입력해주세요 (예: S, M)', 'err');
    setTimeout(() => { const inp = document.getElementById(`sname-${unnamed.id}`); if (inp) { inp.focus(); inp.scrollIntoView({ behavior:'smooth', block:'center'}); } }, 50);
    return;
  }

  const kst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const dateStr = `${kst.getFullYear()}-${String(kst.getMonth()+1).padStart(2,'0')}-${String(kst.getDate()).padStart(2,'0')}`;
  const cols = TYPES[currentType];

  // 추가 섹션 값을 메인 행에 합치기
  syncExtraFromDOM();

  const rows = sizeBlocks.map(b => {
    // 메인 vals
    const vals = Object.fromEntries(
      cols.map(col => [col, b.vals[col] && b.vals[col] !== '' ? b.vals[col] : '-'])
    );
    // 추가 섹션 vals 합치기 (같은 행에)
    extraSections.forEach(s => {
      s.cols.forEach(col => {
        vals[col] = s.vals[col] && s.vals[col] !== '' ? s.vals[col] : '-';
      });
    });
    // 추가 섹션 타입명 기록 (메모에 append)
    const extraNames = extraSections.map(s => s.name).join(', ');
    const fullMemo = extraNames
      ? (memo ? `${memo} / 추가: ${extraNames}` : `추가: ${extraNames}`)
      : memo;

    return {
      date:     dateStr,
      orderType,
      product,
      type:     currentType,
      sizeName: b.name,
      memo:     fullMemo,
      allCols:  [...cols, ...extraSections.flatMap(s => s.cols)],
      vals
    };
  });

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> 저장 중...`;

  try {
    // CORS 우회: GET 방식으로 전송
    const params = new URLSearchParams({
      action: 'saveMultiple',
      data: encodeURIComponent(JSON.stringify(rows))
    });
    const res  = await fetch(SCRIPT_URL + '?' + params.toString(), { method: 'GET' });
    const data = await res.json();
    if (data.result === 'ok') {
      showToast(`✅ ${rows.length}개 사이즈 저장 완료!`, 'ok');
      resetForm();
    } else {
      throw new Error(data.error || '저장 실패');
    }
  } catch (e) {
    showToast('저장 실패: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 10l5 5L17 4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 저장 <span class="save-count-badge" id="save-count">${sizeBlocks.length}개</span>`;
  }
}

function resetForm() {
  document.getElementById('product').value = '';
  document.getElementById('memo').value = '';
  orderType = '';
  document.getElementById('btn-saip').classList.remove('selected');
  document.getElementById('btn-jejak').classList.remove('selected');
  sizeBlocks = [];
  blockIdCounter = 0;
  extraSections = [];
  extraIdCounter = 0;
  document.getElementById('extra-sections-wrap').innerHTML = '';
  renderExtraAddButtons();
  addSizeBlock();
}

// ═══════════════════════════════════════════
//  제작/사입 선택
// ═══════════════════════════════════════════
function selectOrderType(type) {
  orderType = type;
  document.getElementById('btn-saip').classList.toggle('selected', type === '사입');
  document.getElementById('btn-jejak').classList.toggle('selected', type === '제작');
  // 힌트는 항상 보이되 제작일 때 더 진하게
  const hint = document.getElementById('product-hint');
  hint.style.color = type === '제작' ? '#999' : '#c0c0be';
}

// ═══════════════════════════════════════════
//  설정 바텀시트
// ═══════════════════════════════════════════
function checkBanner() {
  document.getElementById('setup-banner').classList.toggle('hidden', !!SCRIPT_URL);
}
function openSettings() {
  document.getElementById('url-input').value = SCRIPT_URL;
  document.getElementById('overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('overlay').classList.remove('open');
}
function saveSettings() {
  const v = document.getElementById('url-input').value.trim();
  if (!v.startsWith('https://script.google.com')) { showToast('올바른 URL을 입력해주세요', 'err'); return; }
  SCRIPT_URL = v;
  localStorage.setItem('thejsoo_script_url', SCRIPT_URL);
  checkBanner();
  closeSettings();
  showToast('연결 설정 완료!', 'ok');
}

// ═══════════════════════════════════════════
//  토스트
// ═══════════════════════════════════════════
let _tt;
function showToast(msg, type = '') {
  clearTimeout(_tt);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show${type ? ' '+type : ''}`;
  _tt = setTimeout(() => { el.className = 'toast'; }, 2800);
}

init();
</script>
</body>
</html>
