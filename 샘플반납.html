<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더제이수 샘플 반납 엑셀 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --primary: #1a1a2e; --accent: #e94560; --bg: #f8f7f4;
    --surface: #ffffff; --border: #e8e4de; --text: #1a1a2e;
    --muted: #8a8680; --success: #16a34a; --tag-bg: #f0ede8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--primary); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .logo { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-sub { color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 300; }
  main { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .section-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1rem; }
  .db-panel { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; margin-bottom: 1.5rem; overflow: hidden; }
  .db-panel-header { padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; transition: background 0.15s; }
  .db-panel-header:hover { background: #fafaf8; }
  .db-panel-title { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
  .db-badge { font-size: 11px; background: var(--tag-bg); color: var(--muted); padding: 2px 10px; border-radius: 20px; font-weight: 400; }
  .db-badge.ok { background: #dcfce7; color: #15803d; }
  .db-chevron { color: var(--muted); transition: transform 0.2s; font-size: 18px; line-height: 1; }
  .db-chevron.open { transform: rotate(180deg); }
  .db-panel-body { display: none; padding: 1rem 1.5rem 1.5rem; border-top: 1px solid var(--border); }
  .db-panel-body.open { display: block; }
  .add-vendor-form { background: #fafaf8; border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 1rem; }
  .add-vendor-form-header { padding: 8px 14px; background: var(--tag-bg); font-size: 12px; font-weight: 500; color: var(--muted); border-bottom: 1px solid var(--border); }
  .add-vendor-form-body { padding: 14px; display: grid; grid-template-columns: 1fr 1fr 1.5fr auto; gap: 8px; align-items: end; }
  .form-field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 500; }
  .form-field input { width: 100%; height: 38px; border: 1.5px solid var(--border); border-radius: 8px; padding: 0 10px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: #fff; outline: none; transition: border-color 0.15s; }
  .form-field input:focus { border-color: var(--primary); }
  .btn-add-vendor { height: 38px; padding: 0 16px; border: none; border-radius: 8px; background: var(--primary); color: #fff; font-size: 13px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-add-vendor:hover { background: #2d2d4e; }
  .btn-add-vendor:disabled { background: var(--muted); cursor: not-allowed; }
  .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .input-grid { display: grid; grid-template-columns: 1fr 1.8fr auto; gap: 10px; align-items: start; margin-bottom: 8px; }
  .input-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .inp { width: 100%; height: 44px; border: 1.5px solid var(--border); border-radius: 10px; padding: 0 12px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: #fafaf8; transition: border-color 0.15s, background 0.15s; outline: none; }
  .inp:focus { border-color: var(--primary); background: #fff; }
  .inp.matched { border-color: var(--success); background: #f0fdf4; }
  .inp.no-match { border-color: #f59e0b; background: #fffbeb; }
  .del-btn { width: 44px; height: 44px; border: 1.5px solid var(--border); border-radius: 10px; background: transparent; cursor: pointer; font-size: 18px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.15s; align-self: flex-end; }
  .del-btn:hover { background: #fef2f2; border-color: #fca5a5; color: var(--accent); }
  .match-preview { font-size: 11.5px; color: var(--success); padding: 3px 8px; margin-top: 4px; background: #f0fdf4; border-radius: 6px; display: none; }
  .match-preview.warn { color: #92400e; background: #fffbeb; display: block; }
  .match-preview.ok { display: block; }
  .autocomplete-wrapper { position: relative; }
  .autocomplete-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1.5px solid var(--primary); border-radius: 10px; z-index: 200; max-height: 200px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .autocomplete-item { padding: 10px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active { background: #f0f4ff; }
  .autocomplete-item .ac-name { font-weight: 500; }
  .autocomplete-item .ac-info { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .add-row-btn { width: 100%; height: 42px; border: 1.5px dashed var(--border); border-radius: 10px; background: transparent; cursor: pointer; font-size: 13px; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .add-row-btn:hover { background: var(--tag-bg); border-color: var(--primary); color: var(--primary); }
  .preview-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; }
  .preview-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .preview-header h3 { font-size: 14px; font-weight: 500; }
  .row-count { font-size: 12px; color: var(--muted); background: var(--tag-bg); padding: 3px 10px; border-radius: 20px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th { background: var(--primary); color: rgba(255,255,255,0.85); padding: 10px 12px; text-align: left; font-weight: 500; white-space: nowrap; font-size: 11.5px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: #fafaf8; }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 9px 12px; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--tag-bg); color: var(--muted); font-weight: 500; }
  .tag.auto { background: #eff6ff; color: #1d4ed8; }
  .no-match-cell { color: #f59e0b; font-weight: 500; }
  .action-bar { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-secondary { height: 48px; padding: 0 1.5rem; border: 1.5px solid var(--border); border-radius: 12px; background: transparent; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { background: var(--tag-bg); border-color: var(--primary); }
  .btn-primary { height: 48px; padding: 0 2rem; border: none; border-radius: 12px; background: var(--accent); font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; color: #fff; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
  .btn-primary:hover { background: #c73652; transform: translateY(-1px); }
  .btn-primary svg { width: 16px; height: 16px; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 640px) { .input-grid { grid-template-columns: 1fr 1fr auto; } .add-vendor-form-body { grid-template-columns: 1fr 1fr; } main { padding: 1.5rem 1rem; } }
</style>
</head>
<body>
<header>
  <div class="logo">더제이수 <span>샘플 반납</span> 엑셀 생성기</div>
  <div class="header-sub" id="db-status-header">거래처 로딩 중...</div>

<main>

        <span class="db-badge" id="db-badge">로딩중</span>
        <span style="font-size:11px; color:var(--muted); font-weight:400;">신규 거래처 추가 시 업데이트하세요</span>
      </div>
      <span class="db-chevron" id="db-chevron">&#8964;</span>
    </div>
    <div class="db-panel-body" id="db-panel-body">
      <p style="font-size:12px; color:var(--muted); line-height:1.8;">아래에서 신규 거래처를 바로 추가할 수 있어요. 추가하면 구글 시트에 자동 반영됩니다.</p>
      <div class="add-vendor-form">
        <div class="add-vendor-form-header">새 거래처 추가</div>
        <div class="add-vendor-form-body">
          <div class="form-field"><label>거래처명 *</label><input type="text" id="new-name" placeholder="예: 글로우님프"></div>
          <div class="form-field"><label>전화번호</label><input type="text" id="new-phone" placeholder="예: 2250-1890"></div>
          <div class="form-field"><label>주소</label><input type="text" id="new-addr" placeholder="예: APM B1-8"></div>
          <button class="btn-add-vendor" id="btn-add-vendor" onclick="addVendorToSheet()">추가하기</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-section">
    <p class="section-title">발주 입력</p>
    <div id="rows-container"></div>
    <button class="add-row-btn" onclick="addRow()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      행 추가
    </button>
  </div>

  <div class="preview-section">
    <div class="preview-header"><h3>미리보기</h3><span class="row-count" id="row-count">0개 항목</span></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>동대문도착일</th><th>업체명</th><th>연락처</th><th>주소</th><th>상품명</th><th>옵션</th><th>원가</th><th>주문</th><th>비고</th><th>사용자관리코드</th></tr></thead>
        <tbody id="preview-body"><tr><td colspan="10" style="text-align:center;color:var(--muted);padding:2rem;">업체명 또는 상품명을 입력하면 여기에 미리보기가 표시됩니다</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-secondary" onclick="clearAll()">전체 초기화</button>
    <button class="btn-primary" onclick="downloadExcel()">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 1v9M5 7l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      엑셀 다운로드
    </button>
  </div>
</main>
<div class="toast" id="toast"></div>

var VENDOR_DB = [];

async function loadVendorDB() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SHEET_NAME);
    var res = await fetch(url);
    var text = await res.text();
    var start = text.indexOf('(');
    var end = text.lastIndexOf(')');
    var json = JSON.parse(text.slice(start + 1, end));
    var parsed = [];
    json.table.rows.forEach(function(row) {
      var n = (row.c[0] && row.c[0].v) ? String(row.c[0].v).trim() : '';
      var p = (row.c[1] && row.c[1].v) ? String(row.c[1].v).trim() : '';
      var a = (row.c[2] && row.c[2].v) ? String(row.c[2].v).trim() : '';
      if (n && n !== '거래처명' && n !== '업체명') parsed.push({업체명:n, 전화번호:p, 주소:a});
    });
    if (parsed.length > 0) {
      VENDOR_DB = parsed;
      setStatus(VENDOR_DB.length, '구글 시트 연동');
    } else throw new Error('empty');
  } catch(e) {
    VENDOR_DB = FALLBACK_DB;
    setStatus(VENDOR_DB.length, '로컬 데이터');
  }
}

function addVendorToSheet() {
  var name = document.getElementById('new-name').value.trim();
  var phone = document.getElementById('new-phone').value.trim();
  var addr = document.getElementById('new-addr').value.trim();
  if (!name) { showToast('거래처명을 입력해주세요'); document.getElementById('new-name').focus(); return; }
  var btn = document.getElementById('btn-add-vendor');
  btn.disabled = true; btn.textContent = '추가 중...';

  // 사이즈 입력기와 동일한 방식: action=save + data=encodeURIComponent(JSON)
  var payload = { name: name, phone: phone, addr: addr };
  var url = APPS_SCRIPT_URL
    + '?action=save'
    + '&data=' + encodeURIComponent(JSON.stringify(payload));

  fetch(url, { method: 'GET', mode: 'no-cors' })
    .then(function() {
      VENDOR_DB.push({업체명: name, 전화번호: phone, 주소: addr});
      setStatus(VENDOR_DB.length, '구글 시트 연동');
      document.getElementById('new-name').value = '';
      document.getElementById('new-phone').value = '';
      document.getElementById('new-addr').value = '';
      document.getElementById('new-name').focus();
      updatePreview();
      showToast('✓ ' + name + ' 추가 완료! 구글 시트에 반영됩니다.');
      btn.disabled = false; btn.textContent = '추가하기';
    })
    .catch(function() {
      showToast('추가 실패. 잠시 후 다시 시도해주세요.');
      btn.disabled = false; btn.textContent = '추가하기';
    });
}

function setStatus(count, src) {
  document.getElementById('db-badge').textContent = count + '개';
  document.getElementById('db-badge').className = src === '구글 시트 연동' ? 'db-badge ok' : 'db-badge';
  document.getElementById('db-status-header').textContent = src + ' · ' + count + '개';
}

function toggleDbPanel() {
  document.getElementById('db-panel-body').classList.toggle('open');
  document.getElementById('db-chevron').classList.toggle('open');
}

function findVendor(name) {
  if (!name || !name.trim()) return null;
  var q = name.trim();
  return VENDOR_DB.find(function(v){ return v.업체명 === q; }) ||
         VENDOR_DB.find(function(v){ return v.업체명.includes(q) || q.includes(v.업체명); }) || null;
}

function searchVendors(q) {
  if (!q || q.length < 1) return [];
  return VENDOR_DB.filter(function(v){ return v.업체명.includes(q) || q.includes(v.업체명); }).slice(0, 8);
}

function addRow() {
  var id = rowId++;
  var container = document.getElementById('rows-container');
  var div = document.createElement('div');
  div.id = 'row-' + id;
  div.style.marginBottom = '10px';
  div.innerHTML =
    '<div class="input-grid">' +
      '<div><div class="input-label">업체명</div>' +
        '<div class="autocomplete-wrapper">' +
          '<input class="inp" id="vendor-' + id + '" placeholder="업체명 입력" autocomplete="off">' +
          '<div class="autocomplete-list" id="ac-' + id + '" style="display:none;"></div>' +
        '</div>' +
        '<div class="match-preview" id="mp-' + id + '"></div></div>' +
      '<div><div class="input-label">상품명</div><input class="inp" id="product-' + id + '" placeholder="상품명 입력"></div>' +
      '<div style="display:flex;align-items:flex-end;"><button class="del-btn" onclick="removeRow(' + id + ')">×</button></div>' +
    '</div>';
  container.appendChild(div);
  var vi = document.getElementById('vendor-' + id);
  var pi = document.getElementById('product-' + id);
  vi.addEventListener('input', function(){ onVendorInput(id); });
  vi.addEventListener('blur', function(){ setTimeout(function(){ var a=document.getElementById('ac-'+id); if(a) a.style.display='none'; },150); });
  vi.addEventListener('keydown', function(e){ onVendorKey(e,id); });
  pi.addEventListener('input', function(){ updatePreview(); });
  pi.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); addRow(); } });
  vi.focus();
  updatePreview();
}

function onVendorInput(id) {
  var val = document.getElementById('vendor-'+id).value;
  var ac = document.getElementById('ac-'+id);
  var inp = document.getElementById('vendor-'+id);
  var mp = document.getElementById('mp-'+id);
  if (!ac||!inp||!mp) return;
  var results = searchVendors(val);
  if (val.length>0 && results.length>0) {
    ac.innerHTML = results.map(function(v){
      return '<div class="autocomplete-item" data-name="'+v.업체명.replace(/"/g,'&quot;')+'"><div class="ac-name">'+v.업체명+'</div><div class="ac-info">'+v.전화번호+' · '+v.주소+'</div></div>';
    }).join('');
    ac.querySelectorAll('.autocomplete-item').forEach(function(item){
      item.addEventListener('mousedown', function(){ selectVendor(id, item.getAttribute('data-name')); });
    });
    ac.style.display='block';
  } else { ac.style.display='none'; }
  var match = findVendor(val);
  if (val.length>0) {
    if (match) { inp.className='inp matched'; mp.textContent='✓ '+match.전화번호+' · '+match.주소; mp.className='match-preview ok'; }
    else { inp.className='inp no-match'; mp.textContent='거래처 목록에 없는 업체 (수동 확인 필요)'; mp.className='match-preview warn'; }
  } else { inp.className='inp'; mp.className='match-preview'; }
  updatePreview();
}

function selectVendor(id, name) {
  var inp=document.getElementById('vendor-'+id); var ac=document.getElementById('ac-'+id);
  if(inp) inp.value=name; if(ac) ac.style.display='none';
  onVendorInput(id);
  setTimeout(function(){ var p=document.getElementById('product-'+id); if(p) p.focus(); },50);
}

function onVendorKey(e,id) {
  var ac=document.getElementById('ac-'+id); if(!ac) return;
  var items=ac.querySelectorAll('.autocomplete-item'); var active=ac.querySelector('.active');
  if (e.key==='ArrowDown') { e.preventDefault(); if(!active&&items[0]) items[0].classList.add('active'); else if(active){ var n=active.nextElementSibling; active.classList.remove('active'); if(n) n.classList.add('active'); } }
  else if (e.key==='ArrowUp') { e.preventDefault(); if(active){ var p=active.previousElementSibling; active.classList.remove('active'); if(p) p.classList.add('active'); } }
  else if (e.key==='Enter') { if(active){ e.preventDefault(); active.dispatchEvent(new MouseEvent('mousedown')); } else { var pi=document.getElementById('product-'+id); if(pi){ e.preventDefault(); pi.focus(); } } }
  else if (e.key==='Tab') { ac.style.display='none'; }
}

function removeRow(id) { var el=document.getElementById('row-'+id); if(el) el.remove(); updatePreview(); }

function today() {
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getRows() {
  var rows=[];
  document.querySelectorAll('[id^="row-"]').forEach(function(el){
    var id=el.id.replace('row-','');
    var ve=document.getElementById('vendor-'+id); var pe=document.getElementById('product-'+id);
    if(ve||pe) rows.push({vendor:ve?ve.value.trim():'',product:pe?pe.value.trim():''});
  });
  return rows;
}

function updatePreview() {
  var valid=getRows().filter(function(r){ return r.vendor||r.product; });
  document.getElementById('row-count').textContent=valid.length+'개 항목';
  var tbody=document.getElementById('preview-body');
  if (!valid.length) { tbody.innerHTML='<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:2rem;">업체명 또는 상품명을 입력하면 여기에 미리보기가 표시됩니다</td></tr>'; return; }
  tbody.innerHTML=valid.map(function(r){
    var v=findVendor(r.vendor);
    var phone=v?v.전화번호:(r.vendor?'<span class="no-match-cell">미매칭</span>':'');
    return '<tr><td>'+today()+'</td><td>'+r.vendor+'</td><td>'+phone+'</td><td>'+(v?v.주소:'')+'</td><td>'+(r.product||'')+'</td><td><span class="tag auto">전색상</span></td><td><span class="tag">1</span></td><td><span class="tag">1</span></td><td><span class="tag auto">샘플반납</span></td><td></td></tr>';
  }).join('');
}

function downloadExcel() {
  var rows=getRows().filter(function(r){ return r.vendor||r.product; });
  if (!rows.length) { showToast('입력된 데이터가 없습니다'); return; }
  var wb=XLSX.utils.book_new();
  var headers=['동대문도착일','업체명','연락처','주소','상품명','옵션','원가','주문','비고','사용자관리코드'];
  var data=[headers];
  rows.forEach(function(r){
    var v=findVendor(r.vendor);
    data.push([today(),r.vendor||'',v?v.전화번호:'',v?v.주소:'',r.product||'',(r.vendor||r.product)?'전색상':'',(r.vendor||r.product)?1:'',(r.vendor||r.product)?1:'',(r.vendor||r.product)?'샘플반납':'','']);
  });
  var ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:14},{wch:18},{wch:15},{wch:28},{wch:32},{wch:9},{wch:7},{wch:7},{wch:12},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'발주서');
  XLSX.writeFile(wb,'더제이수_샘플반납_'+today().replace(/-/g,'')+'.xlsx');
  showToast(rows.length+'개 항목 엑셀 다운로드 완료!');
}

function clearAll() { document.getElementById('rows-container').innerHTML=''; rowId=0; updatePreview(); addRow(); addRow(); }

function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2800);
}

loadVendorDB();
addRow(); addRow();
setTimeout(function(){ var f=document.getElementById('vendor-0'); if(f) f.focus(); },400);
</script>
