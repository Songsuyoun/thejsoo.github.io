<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>샘플 요청 | 더제이수</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root {
  --bg: #F7F6F3;
  --white: #FFFFFF;
  --black: #111111;
  --gray-100: #F2F1EE;
  --gray-200: #E6E3DE;
  --gray-400: #B0ADA7;
  --gray-600: #6B6760;
  --accent: #C8603A;
  --accent-light: #FAF0EC;
  --green: #2D6A4F;
  --green-light: #EAF4EE;
  --blue: #1A56A0;
  --blue-light: #EBF2FC;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --font: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--black); min-height: 100vh; padding-bottom: 40px; }

header {
  background: var(--black);
  padding: 18px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { color: white; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.logo span { color: var(--accent); }
.step-badge { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); font-size: 11px; padding: 4px 12px; border-radius: 20px; }

.main { max-width: 680px; margin: 0 auto; padding: 24px 16px; }

/* 안내 */
.guide { background: var(--blue-light); border: 1px solid #C5D9F2; border-radius: 10px; padding: 14px 16px; font-size: 12px; color: var(--blue); line-height: 1.8; margin-bottom: 20px; }
.guide strong { font-weight: 700; }

/* API 키 */
.api-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.card-label { font-size: 11px; font-weight: 700; color: var(--gray-600); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.api-row { display: flex; gap: 8px; }
.api-input { flex: 1; border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: var(--font); outline: none; background: var(--gray-100); transition: border-color 0.15s; }
.api-input:focus { border-color: var(--black); background: white; }
.btn-sm { padding: 10px 16px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; font-family: var(--font); cursor: pointer; background: var(--black); color: white; transition: all 0.15s; white-space: nowrap; }
.btn-sm:hover { background: #333; }
.api-status { font-size: 11px; margin-top: 8px; padding: 5px 10px; border-radius: 6px; display: none; }
.api-status.ok { display: block; background: var(--green-light); color: var(--green); }
.api-status.error { display: block; background: #FDECEA; color: #C0392B; }

/* 업로드 */
.upload-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.upload-area { border: 2px dashed var(--gray-200); border-radius: 10px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.15s; background: var(--gray-100); position: relative; }
.upload-area:hover { border-color: var(--black); background: #EEEDEA; }
.upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 36px; margin-bottom: 10px; }
.upload-area h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.upload-area p { font-size: 12px; color: var(--gray-600); }
.preview-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; border: 1px solid var(--gray-200); margin-top: 14px; display: none; }

.btn-analyze { width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer; margin-top: 14px; display: none; transition: all 0.15s; }
.btn-analyze.show { display: block; }
.btn-analyze:hover { background: #b0522e; }
.btn-analyze:disabled { background: var(--gray-400); cursor: not-allowed; }

/* 로딩 */
.loading { text-align: center; padding: 28px; display: none; }
.loading.show { display: block; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--gray-200); border-top-color: var(--black); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 결과 카드들 */
.results-wrap { display: none; }
.results-wrap.show { display: block; }
.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 2px; }
.results-title { font-size: 12px; font-weight: 700; color: var(--gray-600); letter-spacing: 0.08em; text-transform: uppercase; }

.product-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.product-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); animation: slideUp 0.25s ease; }
@keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.card-top { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--gray-100); }
.card-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--gray-200); flex-shrink: 0; }
.card-thumb-placeholder { width: 56px; height: 56px; border-radius: 8px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.card-info { flex: 1; }
.card-num { font-size: 10px; color: var(--gray-400); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
.card-name-input { width: 100%; border: none; background: transparent; font-size: 14px; font-weight: 700; font-family: var(--font); color: var(--black); outline: none; }
.card-vendor { font-size: 12px; color: var(--gray-600); margin-top: 2px; }
.card-remove { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--gray-100); color: var(--gray-600); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-remove:active { background: #FDECEA; color: #C0392B; }

.card-body { padding: 12px 14px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field-row.single { grid-template-columns: 1fr; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 10px; font-weight: 700; color: var(--gray-400); letter-spacing: 0.08em; text-transform: uppercase; }
.field input, .field select { border: 1.5px solid var(--gray-200); border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: var(--font); color: var(--black); background: var(--gray-100); outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
.field input:focus, .field select:focus { border-color: var(--black); background: white; }

/* 저장 버튼 */
.save-all-wrap { position: sticky; bottom: 0; background: white; border-top: 1px solid var(--gray-200); padding: 14px 16px calc(14px + env(safe-area-inset-bottom)); display: none; }
.save-all-wrap.show { display: block; }
.btn-save-all { width: 100%; background: var(--green); color: white; border: none; border-radius: 10px; padding: 16px; font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; }
.btn-save-all:hover { background: #1f4d38; }
.btn-save-all:disabled { background: var(--gray-400); cursor: not-allowed; }

/* 토스트 */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--black); color: white; padding: 11px 20px; border-radius: 24px; font-size: 13px; font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 300; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 480px) {
  .field-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">더제이수 <span>샘플요청</span></div>
  <div class="step-badge">① 요청 등록</div>
</header>

<div class="main">

  <div class="guide">
    💡 <strong>사용법:</strong> 신상마켓 찜 리스트 화면을 캡처해서 올려주세요.<br>
    AI가 상품명·거래처를 자동 인식하고 이미지도 분리해드려요.
  </div>

  <!-- API 키 -->
  <div class="api-card">
    <div class="card-label">Anthropic API 키</div>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-...">
      <button class="btn-sm" onclick="saveApiKey()">저장</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- 업로드 -->
  <div class="upload-card">
    <div class="card-label">찜 리스트 캡처 업로드</div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div class="upload-icon">📸</div>
      <h3>캡처 이미지를 올려주세요</h3>
      <p>클릭해서 파일 선택 · 또는 <strong>Ctrl+V</strong> 붙여넣기</p>
    </div>
    <img id="previewImg" class="preview-img" alt="미리보기">
    <button class="btn-analyze" id="btnAnalyze" onclick="analyzeImage()">
      🤖 AI로 상품 분석하기
    </button>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px; color:var(--gray-600);">이미지에서 상품을 인식하는 중...</p>
  </div>

  <!-- 결과 -->
  <div class="results-wrap" id="resultsWrap">
    <div class="results-header">
      <div class="results-title">인식된 상품 <span id="resultCount">0</span>개</div>
      <button onclick="resetAll()" style="font-size:12px; color:var(--gray-600); background:none; border:none; cursor:pointer;">다시 올리기</button>
    </div>
    <div class="product-cards" id="productCards"></div>
  </div>

</div>

<!-- 저장 버튼 -->
<div class="save-all-wrap" id="saveAllWrap">
  <button class="btn-save-all" id="btnSaveAll" onclick="saveToSheet()">
    📊 구글 시트에 전체 저장 (<span id="saveCount">0</span>개)
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwfelSlPiN9AwwD5aID2ypYYjLh9B6lb2TpXHj6qXYIgNqEivojUicTGn7WzMwCChLGEQ/exec';
let currentBase64 = '';
let currentType = '';
let products = [];

// API 키
function saveApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key.startsWith('sk-ant-')) { showApiStatus('API 키 형식이 올바르지 않아요 (sk-ant-로 시작)', false); return; }
  localStorage.setItem('anthropic_key', key);
  showApiStatus('✅ 저장 완료! 다음에도 자동으로 불러와요', true);
}
function getApiKey() { return localStorage.getItem('anthropic_key') || document.getElementById('apiKey').value.trim(); }
function showApiStatus(msg, ok) {
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = 'api-status ' + (ok ? 'ok' : 'error');
}

// 페이지 로드시 저장된 키 불러오기
window.addEventListener('load', () => {
  const saved = localStorage.getItem('anthropic_key');
  if (saved) { document.getElementById('apiKey').value = saved; showApiStatus('✅ 저장된 API 키를 불러왔어요', true); }
});

// 파일 업로드
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleImageFile(file);
});

// 클립보드 붙여넣기 (Ctrl+V)
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { handleImageFile(file); showToast('📋 이미지 붙여넣기 완료!'); }
      break;
    }
  }
});

function handleImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const full = ev.target.result;
    currentBase64 = full.split(',')[1];
    currentType = file.type;
    document.getElementById('previewImg').src = full;
    document.getElementById('previewImg').style.display = 'block';
    document.getElementById('btnAnalyze').classList.add('show');
    document.getElementById('resultsWrap').classList.remove('show');
    document.getElementById('saveAllWrap').classList.remove('show');
  };
  reader.readAsDataURL(file);
}

// AI 분석
async function analyzeImage() {
  const key = getApiKey();
  if (!key) { showToast('❌ API 키를 먼저 입력해주세요'); return; }
  if (!currentBase64) { showToast('❌ 이미지를 먼저 올려주세요'); return; }

  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('btnAnalyze').textContent = '분석 중...';
  document.getElementById('loading').classList.add('show');
  document.getElementById('resultsWrap').classList.remove('show');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentType, data: currentBase64 } },
            { type: 'text', text: `이 신상마켓 찜 리스트 이미지에서 상품 정보를 추출해주세요.
각 상품마다 상품명과 거래처(업체명)를 추출하세요.
거래처는 "디오트 / flutter(플러터)" 형식이면 슬래시 뒤쪽만 사용하세요.

반드시 JSON 배열만 반환하세요:
[{"상품명":"...","거래처":"..."},{"상품명":"...","거래처":"..."}]` }
          ]
        }]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.[0]?.text || '[]';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // 이미지 크롭
    await cropAndRender(parsed);

  } catch(e) {
    showToast('❌ 분석 실패: ' + e.message);
    console.error(e);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('btnAnalyze').disabled = false;
    document.getElementById('btnAnalyze').textContent = '🤖 AI로 상품 분석하기';
  }
}

// 이미지 크롭
async function cropAndRender(parsed) {
  const img = new Image();
  img.src = document.getElementById('previewImg').src;
  await new Promise(r => img.onload = r);

  const count = parsed.length;
  const cardW = Math.floor(img.width / count);
  const cardH = Math.floor(img.height * 0.68);

  products = parsed.map((p, i) => {
    const canvas = document.createElement('canvas');
    canvas.width = cardW - 10;
    canvas.height = cardH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, i * cardW, 0, cardW - 10, cardH, 0, 0, cardW - 10, cardH);
    return { ...p, imageDataUrl: canvas.toDataURL('image/jpeg', 0.85), id: i };
  });

  renderCards();
}

function renderCards() {
  const container = document.getElementById('productCards');
  const today = new Date().toISOString().split('T')[0];
  container.innerHTML = '';
  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="card-top">
        <img class="card-thumb" src="${p.imageDataUrl}" alt="">
        <div class="card-info">
          <div class="card-num">상품 ${i+1}</div>
          <input class="card-name-input" id="name-${i}" value="${esc(p.상품명)}" placeholder="상품명">
          <div class="card-vendor" id="vendor-disp-${i}">${esc(p.거래처)}</div>
        </div>
        <button class="card-remove" onclick="removeProduct(${i})">✕</button>
      </div>
      <div class="card-body">
        <div class="field-row">
          <div class="field">
            <label>거래처</label>
            <input id="vendor-${i}" value="${esc(p.거래처)}" placeholder="거래처명">
          </div>
          <div class="field">
            <label>요청일</label>
            <input type="date" id="reqdate-${i}" value="${today}">
          </div>
        </div>
        <div class="field-row single">
          <div class="field">
            <label>출처</label>
            <select id="source-${i}">
              <option value="신상마켓" selected>신상마켓</option>
              <option value="주거래처">주거래처</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('resultCount').textContent = products.length;
  document.getElementById('saveCount').textContent = products.length;
  document.getElementById('resultsWrap').classList.add('show');
  document.getElementById('saveAllWrap').classList.add('show');
}

function removeProduct(i) {
  products.splice(i, 1);
  renderCards();
  if (products.length === 0) {
    document.getElementById('resultsWrap').classList.remove('show');
    document.getElementById('saveAllWrap').classList.remove('show');
  }
}

// 구글 시트 저장
async function saveToSheet() {
  const btn = document.getElementById('btnSaveAll');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  let success = 0;
  for (let i = 0; i < products.length; i++) {
    const name = document.getElementById('name-' + i)?.value || products[i].상품명;
    const vendor = document.getElementById('vendor-' + i)?.value || products[i].거래처;
    const reqdate = document.getElementById('reqdate-' + i)?.value || '';
    const source = document.getElementById('source-' + i)?.value || '신상마켓';

    try {
      const payload = encodeURIComponent(JSON.stringify({
        상품명: name,
        거래처: vendor,
        이미지URL: '',
        요청일: reqdate,
        입고일: '',
        반납기한: '',
        상태: '요청중',
        반납일: '',
        출처: source,
        비고: ''
      }));
      await fetch(`${GAS_URL}?action=add&data=${payload}`, { mode: 'no-cors' });
      success++;
    } catch(e) { console.error(e); }
  }

  btn.disabled = false;
  btn.innerHTML = `📊 구글 시트에 전체 저장 (<span id="saveCount">${products.length}</span>개)`;
  showToast(`✅ ${success}개 저장 완료! 구글 시트를 확인해주세요`);
}

function resetAll() {
  currentBase64 = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('btnAnalyze').classList.remove('show');
  document.getElementById('resultsWrap').classList.remove('show');
  document.getElementById('saveAllWrap').classList.remove('show');
  products = [];
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
