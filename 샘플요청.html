<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>샘플 요청 | 더제이수</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root {
  --bg: #F7F6F3; --white: #FFF; --black: #111;
  --gray-100: #F2F1EE; --gray-200: #E6E3DE; --gray-400: #B0ADA7; --gray-600: #6B6760;
  --accent: #C8603A; --accent-light: #FAF0EC;
  --green: #2D6A4F; --green-light: #EAF4EE;
  --blue: #1A56A0; --blue-light: #EBF2FC;
  --red: #C0392B; --red-light: #FDECEA;
  --amber: #B8860B; --amber-light: #FEF9E7;
  --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,0.07); --font: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--black); min-height: 100vh; padding-bottom: 110px; }

header { background: var(--black); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { color: white; font-size: 16px; font-weight: 700; }
.logo span { color: var(--accent); }
.step-badge { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); font-size: 11px; padding: 4px 12px; border-radius: 20px; }
.main { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

.guide { background: var(--blue-light); border: 1px solid #C5D9F2; border-radius: 10px; padding: 12px 16px; font-size: 12px; color: var(--blue); line-height: 1.7; margin-bottom: 14px; }

/* DB 상태 바 */
.db-bar {
  background: var(--white); border: 1px solid var(--gray-200); border-radius: 10px;
  padding: 12px 16px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
}
.db-status { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.db-status.loading { background: var(--blue-light); color: var(--blue); }
.db-status.ok { background: var(--green-light); color: var(--green); }
.db-status.error { background: var(--red-light); color: var(--red); }
.db-link {
  font-size: 12px; color: var(--blue); text-decoration: none; font-weight: 600;
  padding: 5px 12px; border: 1.5px solid #C5D9F2; border-radius: 8px;
  background: var(--blue-light); transition: all 0.15s;
}
.db-link:hover { background: #D6E8FB; }

/* API 카드 */
.api-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.card-label { font-size: 10px; font-weight: 700; color: var(--gray-600); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.api-row { display: flex; gap: 8px; }
.api-input { flex: 1; border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: var(--font); outline: none; background: var(--gray-100); }
.api-input:focus { border-color: var(--black); background: white; }
.btn-sm { padding: 9px 16px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; font-family: var(--font); cursor: pointer; background: var(--black); color: white; white-space: nowrap; }
.api-status { font-size: 11px; margin-top: 6px; padding: 4px 10px; border-radius: 6px; display: none; }
.api-status.ok { display: block; background: var(--green-light); color: var(--green); }
.api-status.error { display: block; background: var(--red-light); color: var(--red); }

/* 업로드 */
.upload-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.upload-area { border: 2px dashed var(--gray-200); border-radius: 10px; padding: 28px 20px; text-align: center; cursor: pointer; background: var(--gray-100); position: relative; transition: all 0.15s; }
.upload-area:hover { border-color: var(--black); background: #EEEDEA; }
.upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 30px; margin-bottom: 8px; }
.upload-area h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.upload-area p { font-size: 11px; color: var(--gray-600); }
.preview-img { width: 100%; max-height: 240px; object-fit: contain; border-radius: 8px; border: 1px solid var(--gray-200); margin-top: 12px; display: none; }
.btn-analyze { width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; font-family: var(--font); cursor: pointer; margin-top: 12px; display: none; transition: all 0.15s; }
.btn-analyze.show { display: block; }
.btn-analyze:disabled { background: var(--gray-400); cursor: not-allowed; }

/* 로딩 */
.loading { text-align: center; padding: 24px; display: none; }
.loading.show { display: block; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--gray-200); border-top-color: var(--black); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 결과 */
.results-wrap { display: none; }
.results-wrap.show { display: block; }
.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 2px; }
.results-title { font-size: 12px; font-weight: 700; color: var(--gray-600); letter-spacing: 0.08em; text-transform: uppercase; }
.stats-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--gray-200); color: var(--gray-600); background: var(--gray-100); font-weight: 500; }
.stat-chip.ok { border-color: var(--green); color: var(--green); background: var(--green-light); }
.stat-chip.warn { border-color: var(--amber); color: var(--amber); background: var(--amber-light); }

/* 컴팩트 카드 */
.product-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.product-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); animation: slideUp 0.2s ease; }
@keyframes slideUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.product-card.unmatched { border-left: 3px solid var(--amber); }

.card-main { display: flex; align-items: center; gap: 12px; padding: 10px 12px; }
.card-thumb { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; border: 1px solid var(--gray-200); flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name-input { width: 100%; border: none; background: transparent; font-size: 14px; font-weight: 700; font-family: var(--font); color: var(--black); outline: none; padding: 0; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-vendor-row { display: flex; align-items: center; gap: 6px; }
.card-vendor-input { flex: 1; border: none; background: transparent; font-size: 12px; font-family: var(--font); color: var(--gray-600); outline: none; padding: 0; min-width: 0; }
.card-vendor-input:focus { color: var(--black); }
.match-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; cursor: default; }
.match-badge.ok { background: var(--green-light); color: var(--green); }
.match-badge.miss { background: var(--amber-light); color: var(--amber); }
.card-remove { width: 26px; height: 26px; border-radius: 50%; border: none; background: var(--gray-100); color: var(--gray-400); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-remove:active { background: var(--red-light); color: var(--red); }

/* 미매칭 입력 폼 */
.card-miss-form {
  margin: 0 12px 10px;
  background: var(--amber-light);
  border: 1px solid #F0D060;
  border-radius: 8px;
  padding: 10px 12px;
}
.miss-form-title { font-size: 10px; font-weight: 700; color: var(--amber); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.miss-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.miss-form-row.single { grid-template-columns: 1fr; }
.miss-input-wrap { display: flex; flex-direction: column; gap: 3px; }
.miss-input-wrap label { font-size: 10px; font-weight: 700; color: var(--amber); }
.miss-input {
  border: 1.5px solid #E0C040; border-radius: 6px; padding: 7px 10px;
  font-size: 12px; font-family: var(--font); background: white;
  color: var(--black); outline: none; width: 100%;
}
.miss-input:focus { border-color: var(--amber); }
.miss-input::placeholder { color: #C8A020; }
.btn-save-vendor {
  width: 100%; padding: 8px; border-radius: 6px; border: none;
  background: var(--amber); color: white;
  font-size: 12px; font-weight: 700; font-family: var(--font);
  cursor: pointer; transition: all 0.15s;
}
.btn-save-vendor:hover { background: #9A6E00; }
.btn-save-vendor:disabled { background: var(--gray-400); cursor: not-allowed; }
.vendor-saved-msg { font-size: 11px; color: var(--green); font-weight: 600; text-align: center; margin-top: 4px; display: none; }

/* 저장 버튼 */
.save-all-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--gray-200); padding: 14px 16px; display: none; z-index: 50; }
.save-all-wrap.show { display: block; }
.save-all-inner { max-width: 680px; margin: 0 auto; }
.btn-save-all { width: 100%; background: var(--green); color: white; border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; }
.btn-save-all:disabled { background: var(--gray-400); cursor: not-allowed; }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--black); color: white; padding: 10px 18px; border-radius: 24px; font-size: 13px; font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 300; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 400px) {
  .miss-form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">더제이수 <span>샘플요청</span></div>
  <div class="step-badge">① 요청 등록</div>
</header>

<div class="main">

  <div class="guide">
    💡 신상마켓 찜 리스트 캡처 → 업로드 or <strong>Ctrl+V</strong><br>
    AI가 상품명·거래처를 인식 → 거래처 DB 자동 매칭 → 구글 시트 저장
  </div>

  <!-- 거래처 DB 상태 + 바로가기 -->
  <div class="db-bar">
    <span class="db-status loading" id="dbStatus">거래처 목록 로딩 중...</span>
    <a href="https://docs.google.com/spreadsheets/d/1bP7Nwovu3wFV7T1UOlUhS-O56nMeZ7-3lSZ0iNHUcrc/edit"
       target="_blank" class="db-link" id="dbLink" style="display:none;">
      📋 거래처 시트 열기
    </a>
  </div>

  <!-- API 키 -->
  <div class="api-card">
    <div class="card-label">Anthropic API 키</div>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-...">
      <button class="btn-sm" onclick="saveApiKey()">저장</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- 업로드 -->
  <div class="upload-card">
    <div class="card-label">찜 리스트 캡처</div>
    <div class="upload-area">
      <input type="file" id="fileInput" accept="image/*">
      <div class="upload-icon">📸</div>
      <h3>이미지 업로드</h3>
      <p>클릭해서 선택 · Ctrl+V 붙여넣기</p>
    </div>
    <img id="previewImg" class="preview-img" alt="">
    <button class="btn-analyze" id="btnAnalyze" onclick="analyzeImage()">🤖 AI로 상품 분석하기</button>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px; color:var(--gray-600);">상품 인식 중...</p>
  </div>

  <!-- 결과 -->
  <div class="results-wrap" id="resultsWrap">
    <div class="results-header">
      <div class="results-title">인식된 상품 <span id="resultCount">0</span>개</div>
      <button onclick="resetAll()" style="font-size:12px; color:var(--gray-600); background:none; border:none; cursor:pointer; font-family:var(--font);">다시 올리기</button>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="product-cards" id="productCards"></div>
  </div>

</div>

<!-- 저장 버튼 -->
<div class="save-all-wrap" id="saveAllWrap">
  <div class="save-all-inner">
    <button class="btn-save-all" id="btnSaveAll" onclick="saveToSheet()">
      📊 구글 시트에 저장 (<span id="saveCount">0</span>개)
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var GAS_VENDOR_URL = 'https://script.google.com/macros/s/AKfycbyDdnhYVgXfr0MTOj0l_kKm6l7cQ061k6cHqtNPauhF7gYuKJWVFRcCQHij3c297b8O/exec';
var GAS_SAMPLE_URL = 'https://script.google.com/macros/s/AKfycbwfelSlPiN9AwwD5aID2ypYYjLh9B6lb2TpXHj6qXYIgNqEivojUicTGn7WzMwCChLGEQ/exec';

// 내장 거래처 DB
var BUILTIN_VENDORS = [
  {"업체명":"글로우님프","전화번호":"2250-1890","위치":"APM B1-8"},

  {"업체명":"르헤베(구.마이영)","전화번호":"2117-8083","위치":"디오트 5-J-26"},
  {"업체명":"마요네즈","전화번호":"2117-8978","위치":"디오트 3-H-15"},
  {"업체명":"온도","전화번호":"2117-8867","위치":"디오트 B1-L-4"},
  {"업체명":"메이빈","전화번호":"010-7791-7918","위치":"디오트 3-B-13"},
  {"업체명":"이너프","전화번호":"2117-4618","위치":"디오트 4-F-21"},
  {"업체명":"루미에르","전화번호":"2250-1234","위치":"APM PLACE"},
  {"업체명":"라운지베라","전화번호":"2117-8241","위치":"디오트 4-C-7"},
  {"업체명":"솔트비","전화번호":"010-7731-7775","위치":"디오트 5-D-11"},
  {"업체명":"모이라이","전화번호":"2117-8042","위치":"디오트 4-A-13"},
  {"업체명":"쿨피스","전화번호":"2117-4070","위치":"디오트 4-D-20"},
  {"업체명":"더샌드","전화번호":"2250-1667","위치":"APM B1-18"},
  {"업체명":"르누보","전화번호":"010-2955-3990","위치":"디오트 4-E-14"},
  {"업체명":"퍼스트런","전화번호":"2117-8708","위치":"디오트 3-G-14"},
  {"업체명":"스랍&아하","전화번호":"2117-4649","위치":"디오트 3-D-15"},
  {"업체명":"JJ","전화번호":"2117-8826","위치":"디오트 B1-D-24"},
  {"업체명":"그라찌","전화번호":"2117-4009","위치":"디오트 B1-E-17"},
  {"업체명":"그루브","전화번호":"2117-4888","위치":"디오트 B2-나-9"},
  {"업체명":"드라이플라워","전화번호":"2117-8419","위치":"디오트 B2-D-13"},
  {"업체명":"드래이핑","전화번호":"2117-8636","위치":"디오트 B1-J-10"},
  {"업체명":"라붐","전화번호":"2117-8027","위치":"디오트 2-B-8"},
  {"업체명":"러브샷","전화번호":"2117-8561","위치":"디오트 B1-B-1"},
  {"업체명":"레이브","전화번호":"2117-4595","위치":"디오트 3-J-13"},
  {"업체명":"로쉘","전화번호":"2117-8650","위치":"디오트 B1-A-8"},
  {"업체명":"무드랩","전화번호":"2117-8233","위치":"디오트 B1-E-5"},

  {"업체명":"비마인","전화번호":"2117-4833","위치":"디오트 3-E-8"},
  {"업체명":"선데이","전화번호":"2117-4972","위치":"디오트 4-H-17"}
];

var BRAND_MAP = [
  { re: /flutter\(플러터\)|flutter/i, target: '플러터' },
  { re: /쿨피스|coolpis/i, target: '쿨피스' },
  { re: /더\s*샌드|the\s*sand/i, target: '더샌드' },
  { re: /르헤베|leheve/i, target: '르헤베(구.마이영)' },
  { re: /프레즐|prezel/i, target: '프레즐' },
  { re: /renouveau|르누보/i, target: '르누보' },
  { re: /ondo\s*온도/, target: '온도' },
  { re: /maybeen|메이빈/i, target: '메이빈' },
  { re: /inouf|이너프/i, target: '이너프' },
  { re: /솔트비|salt_b/i, target: '솔트비' },
  { re: /그라티아|gratia/i, target: '그라티아' },

  { re: /퍼스트런|first\s*run/i, target: '퍼스트런' },
  { re: /라운지베라|lounge\s*vera/i, target: '라운지베라' },
  { re: /모이\(moi\)|모이/, target: '모이라이' },
  { re: /루미에르|lumiere/i, target: '루미에르' }
];

var VENDORS = BUILTIN_VENDORS.slice();
var currentBase64 = '', currentType = '', products = [];

// ── 거래처 DB 로드 ──
async function loadVendorDB() {
  var el = document.getElementById('dbStatus');
  try {
    el.textContent = '거래처 목록 로딩 중...';
    el.className = 'db-status loading';
    var res = await fetch(GAS_VENDOR_URL + '?action=getVendors');
    var data = await res.json();
    if (data.result === 'ok' && Array.isArray(data.vendors) && data.vendors.length > 0) {
      var builtinNames = {};
      BUILTIN_VENDORS.forEach(function(v) { builtinNames[v['업체명'].toLowerCase()] = true; });
      var sheetMap = {};
      data.vendors.forEach(function(v) {
        if (v['업체명']) sheetMap[v['업체명'].toLowerCase()] = v;
      });
      VENDORS = BUILTIN_VENDORS.map(function(v) {
        var sv = sheetMap[v['업체명'].toLowerCase()];
        return sv ? { '업체명': v['업체명'], '전화번호': sv['전화번호']||v['전화번호'], '위치': sv['위치']||v['위치'] } : v;
      });
      data.vendors.forEach(function(v) {
        if (v['업체명'] && !builtinNames[v['업체명'].toLowerCase()]) VENDORS.push(v);
      });
      el.textContent = '✓ 거래처 ' + VENDORS.length + '개 로드됨';
      el.className = 'db-status ok';
      document.getElementById('dbLink').style.display = 'inline';
    } else throw new Error('empty');
  } catch(e) {
    el.textContent = '거래처 ' + VENDORS.length + '개 (내장 데이터)';
    el.className = 'db-status ok';
    document.getElementById('dbLink').style.display = 'inline';
  }
}

function normalizeBrand(raw) {
  var t = (raw || '').trim();
  for (var i = 0; i < BRAND_MAP.length; i++) {
    if (BRAND_MAP[i].re.test(t)) return BRAND_MAP[i].target;
  }
  return t;
}
function findVendor(brandRaw) {
  var target = normalizeBrand(brandRaw).toLowerCase();
  for (var i = 0; i < VENDORS.length; i++) {
    if ((VENDORS[i]['업체명']||'').toLowerCase() === target) return VENDORS[i];
  }
  for (var i = 0; i < VENDORS.length; i++) {
    var vn = (VENDORS[i]['업체명']||'').toLowerCase();
    if (target.indexOf(vn) >= 0 || vn.indexOf(target) >= 0) return VENDORS[i];
  }
  return null;
}

// ── API 키 ──
function saveApiKey() {
  var key = document.getElementById('apiKey').value.trim();
  if (!key.startsWith('sk-ant-')) { showApiStatus('API 키 형식이 올바르지 않아요', false); return; }
  localStorage.setItem('anthropic_key', key);
  showApiStatus('✅ 저장 완료!', true);
}
function getApiKey() { return localStorage.getItem('anthropic_key') || document.getElementById('apiKey').value.trim(); }
function showApiStatus(msg, ok) {
  var el = document.getElementById('apiStatus');
  el.textContent = msg; el.className = 'api-status ' + (ok ? 'ok' : 'error');
}

window.addEventListener('load', function() {
  var saved = localStorage.getItem('anthropic_key');
  if (saved) { document.getElementById('apiKey').value = saved; showApiStatus('✅ 저장된 API 키 불러옴', true); }
  loadVendorDB();
});

// ── 파일 업로드 & 붙여넣기 ──
document.getElementById('fileInput').addEventListener('change', function(e) {
  if (e.target.files[0]) handleImageFile(e.target.files[0]);
});
document.addEventListener('paste', function(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      var file = items[i].getAsFile();
      if (file) { handleImageFile(file); showToast('📋 이미지 붙여넣기 완료!'); }
      break;
    }
  }
});
function handleImageFile(file) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var full = ev.target.result;
    currentBase64 = full.split(',')[1]; currentType = file.type;
    document.getElementById('previewImg').src = full;
    document.getElementById('previewImg').style.display = 'block';
    document.getElementById('btnAnalyze').classList.add('show');
    document.getElementById('resultsWrap').classList.remove('show');
    document.getElementById('saveAllWrap').classList.remove('show');
  };
  reader.readAsDataURL(file);
}

// ── AI 분석 ──
async function analyzeImage() {
  var key = getApiKey();
  if (!key) { showToast('❌ API 키를 입력해주세요'); return; }
  if (!currentBase64) { showToast('❌ 이미지를 올려주세요'); return; }

  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('btnAnalyze').textContent = '분석 중...';
  document.getElementById('loading').classList.add('show');
  document.getElementById('resultsWrap').classList.remove('show');

  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5', max_tokens: 2000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: currentType, data: currentBase64 } },
          { type: 'text', text: '신상마켓 찜 리스트 이미지에서 각 상품의 상품명과 거래처를 추출하세요.\n거래처는 "디오트 / flutter(플러터)" 형식이면 슬래시 뒤쪽(flutter(플러터))만 사용하세요.\nJSON 배열만 반환:\n[{"상품명":"...","거래처":"..."}]' }
        ]}]
      })
    });

    var data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    var text = (data.content && data.content[0] && data.content[0].text) || '[]';
    var parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    await cropAndRender(parsed);

  } catch(e) {
    showToast('❌ 분석 실패: ' + e.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('btnAnalyze').disabled = false;
    document.getElementById('btnAnalyze').textContent = '🤖 AI로 상품 분석하기';
  }
}

// ── 이미지 크롭 ──
async function cropAndRender(parsed) {
  var img = new Image();
  img.src = document.getElementById('previewImg').src;
  await new Promise(function(r) { img.onload = r; });

  var count = parsed.length;
  var cardW = Math.floor(img.width / count);
  var cardH = Math.floor(img.height * 0.68);

  products = parsed.map(function(p, i) {
    var canvas = document.createElement('canvas');
    canvas.width = cardW - 8; canvas.height = cardH;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, i * cardW, 0, cardW - 8, cardH, 0, 0, cardW - 8, cardH);
    var vendor = findVendor(p['거래처']);
    return {
      상품명: p['상품명'],
      거래처: vendor ? vendor['업체명'] : p['거래처'],
      거래처원본: p['거래처'],
      연락처: vendor ? (vendor['전화번호'] || '') : '',
      주소: vendor ? (vendor['위치'] || '') : '',
      matched: !!vendor,
      vendorSaved: !!vendor,
      imageDataUrl: canvas.toDataURL('image/jpeg', 0.85),
      id: i
    };
  });

  renderCards();
}

// ── 카드 렌더링 ──
function renderCards() {
  var container = document.getElementById('productCards');
  container.innerHTML = '';

  var matched = products.filter(function(p) { return p.matched; }).length;
  var unmatched = products.length - matched;
  var statsHtml = '<span class="stat-chip">총 ' + products.length + '개</span>' +
    '<span class="stat-chip ok">✓ 매칭 ' + matched + '개</span>';
  if (unmatched) statsHtml += '<span class="stat-chip warn">✗ 미매칭 ' + unmatched + '개 (연락처·주소 입력 필요)</span>';
  document.getElementById('statsRow').innerHTML = statsHtml;

  products.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'product-card' + (p.matched ? '' : ' unmatched');
    card.id = 'card-' + i;

    var missFormHtml = '';
    if (!p.matched) {
      missFormHtml = '<div class="card-miss-form" id="missform-' + i + '">' +
        '<div class="miss-form-title">⚠️ 거래처 DB에 없는 곳 — 정보 입력 후 시트에 추가해주세요</div>' +
        '<div class="miss-form-row">' +
          '<div class="miss-input-wrap"><label>📞 연락처</label>' +
          '<input class="miss-input" id="phone-' + i + '" placeholder="예: 2117-1234" value="' + esc(p.연락처) + '">' +
          '</div>' +
          '<div class="miss-input-wrap"><label>📍 주소</label>' +
          '<input class="miss-input" id="addr-' + i + '" placeholder="예: 디오트 3-A-1" value="' + esc(p.주소) + '">' +
          '</div>' +
        '</div>' +
        '<button class="btn-save-vendor" id="savevbtn-' + i + '" onclick="saveVendorToDB(' + i + ')">📋 거래처 시트에 추가하기</button>' +
        '<div class="vendor-saved-msg" id="vsaved-' + i + '">✅ 거래처 시트에 추가됐어요!</div>' +
      '</div>';
    }

    card.innerHTML = '<div class="card-main">' +
      '<img class="card-thumb" src="' + p.imageDataUrl + '" alt="">' +
      '<div class="card-info">' +
        '<input class="card-name-input" id="name-' + i + '" value="' + esc(p.상품명) + '" placeholder="상품명">' +
        '<div class="card-vendor-row">' +
          '<input class="card-vendor-input" id="vendor-' + i + '" value="' + esc(p.거래처) + '" placeholder="거래처" oninput="onVendorChange(' + i + ',this.value)">' +
          '<span class="match-badge ' + (p.matched ? 'ok' : 'miss') + '" id="badge-' + i + '">' + (p.matched ? '✓ 매칭' : '✗ 미매칭') + '</span>' +
        '</div>' +
      '</div>' +
      '<button class="card-remove" onclick="removeProduct(' + i + ')">✕</button>' +
    '</div>' + missFormHtml;

    container.appendChild(card);
  });

  document.getElementById('resultCount').textContent = products.length;
  document.getElementById('saveCount').textContent = products.length;
  document.getElementById('resultsWrap').classList.add('show');
  document.getElementById('saveAllWrap').classList.add('show');
}

// ── 거래처 변경 시 실시간 재매칭 ──
function onVendorChange(i, value) {
  var vendor = findVendor(value);
  products[i].거래처 = vendor ? vendor['업체명'] : value;
  products[i].연락처 = vendor ? (vendor['전화번호'] || '') : '';
  products[i].주소   = vendor ? (vendor['위치'] || '') : '';
  products[i].matched = !!vendor;

  var badge = document.getElementById('badge-' + i);
  if (badge) { badge.textContent = vendor ? '✓ 매칭' : '✗ 미매칭'; badge.className = 'match-badge ' + (vendor ? 'ok' : 'miss'); }
  var card = document.getElementById('card-' + i);
  if (card) card.classList.toggle('unmatched', !vendor);

  var missForm = document.getElementById('missform-' + i);
  if (!vendor && !missForm) {
    var div = document.createElement('div');
    div.className = 'card-miss-form'; div.id = 'missform-' + i;
    div.innerHTML =
      '<div class="miss-form-title">⚠️ 거래처 DB에 없는 곳 — 정보 입력 후 시트에 추가해주세요</div>' +
      '<div class="miss-form-row">' +
        '<div class="miss-input-wrap"><label>📞 연락처</label><input class="miss-input" id="phone-' + i + '" placeholder="예: 2117-1234"></div>' +
        '<div class="miss-input-wrap"><label>📍 주소</label><input class="miss-input" id="addr-' + i + '" placeholder="예: 디오트 3-A-1"></div>' +
      '</div>' +
      '<button class="btn-save-vendor" id="savevbtn-' + i + '" onclick="saveVendorToDB(' + i + ')">📋 거래처 시트에 추가하기</button>' +
      '<div class="vendor-saved-msg" id="vsaved-' + i + '">✅ 거래처 시트에 추가됐어요!</div>';
    if (card) card.appendChild(div);
  } else if (vendor && missForm) {
    missForm.remove();
  }
}

// ── 거래처 DB 저장 ──
async function saveVendorToDB(i) {
  var btn = document.getElementById('savevbtn-' + i);
  var vendor = document.getElementById('vendor-' + i)?.value || products[i].거래처;
  var phone  = document.getElementById('phone-'  + i)?.value || '';
  var addr   = document.getElementById('addr-'   + i)?.value || '';

  if (!vendor) { showToast('거래처명을 입력해주세요'); return; }
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    var payload = encodeURIComponent(JSON.stringify({ name: vendor, phone: phone, addr: addr }));
    await fetch(GAS_VENDOR_URL + '?action=save&data=' + payload, { mode: 'no-cors' });

    // 로컬 DB에도 추가
    VENDORS.push({ '업체명': vendor, '전화번호': phone, '위치': addr });
    products[i].연락처 = phone;
    products[i].주소 = addr;
    products[i].vendorSaved = true;

    btn.style.display = 'none';
    var saved = document.getElementById('vsaved-' + i);
    if (saved) saved.style.display = 'block';
    showToast('✅ ' + vendor + ' 거래처 시트에 추가됐어요!');
  } catch(e) {
    btn.disabled = false; btn.textContent = '📋 거래처 시트에 추가하기';
    showToast('❌ 저장 실패: ' + e.message);
  }
}

function removeProduct(i) {
  products.splice(i, 1);
  renderCards();
  if (!products.length) {
    document.getElementById('resultsWrap').classList.remove('show');
    document.getElementById('saveAllWrap').classList.remove('show');
  }
}

// ── 구글 시트 저장 ──
async function saveToSheet() {
  var btn = document.getElementById('btnSaveAll');
  btn.disabled = true; btn.textContent = '저장 중...';
  var today = new Date().toISOString().split('T')[0];
  var success = 0;

  for (var i = 0; i < products.length; i++) {
    var name   = document.getElementById('name-'   + i)?.value || products[i].상품명;
    var vendor = document.getElementById('vendor-' + i)?.value || products[i].거래처;

    var payload = encodeURIComponent(JSON.stringify({
      '상품명': name, '거래처': vendor, '이미지URL': '',
      '요청일': today, '입고일': '', '반납기한': '',
      '상태': '요청중', '반납일': '', '출처': '신상마켓', '비고': ''
    }));

    try {
      await fetch(GAS_SAMPLE_URL + '?action=add&data=' + payload, { mode: 'no-cors' });
      success++;
    } catch(e) { console.error(e); }
  }

  btn.disabled = false;
  btn.innerHTML = '📊 구글 시트에 저장 (<span id="saveCount">' + products.length + '</span>개)';
  showToast('✅ ' + success + '개 저장 완료! 구글 시트를 확인해보세요');
}

function resetAll() {
  currentBase64 = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('btnAnalyze').classList.remove('show');
  document.getElementById('resultsWrap').classList.remove('show');
  document.getElementById('saveAllWrap').classList.remove('show');
  products = [];
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function() { t.classList.remove('show'); }, 3000);
}
</script>
